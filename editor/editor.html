<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vael. // editor</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --bg4: #1e1e1e;
    --bg5: #252525;
    --border: #2a2a2a;
    --border2: #333333;
    --accent: #00d4a0;
    --accent-dim: #00a07a;
    --accent-faint: rgba(0,212,160,0.08);
    --accent-subtle: rgba(0,212,160,0.3);
    --gold: #e8b84b;
    --text: #c8c8c8;
    --text-dim: #666;
    --text-bright: #e8e8e8;
    --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --toolbar-w: 44px;
    --titlebar-h: 34px;
    --action-row-h: 48px;
    --topbar-left-col: 116px;
    --topbar-right-col: 112px;
    --statusbar-h: 26px;
    --gallery-w: 190px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; }
  #app { display: flex; flex-direction: column; width: 100vw; height: 100vh; }

  /* TOPBAR — one grid, not two stacked bars. Left/right columns are each
     split top/bottom (logo+winbtns / quick-actions+history); the middle
     column — the filmstrip — spans both rows, so images get the full
     combined height instead of being boxed into a single row, and there's
     no dead space next to the logo or the window controls. */
  #topbar {
    display: grid; grid-template-columns: var(--topbar-left-col) 1fr var(--topbar-right-col);
    grid-template-rows: var(--titlebar-h) var(--action-row-h);
    background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 400;
    -webkit-app-region: drag;
  }
  #topbar-logo-cell { grid-column: 1; grid-row: 1; display: flex; align-items: center; padding: 0 0 0 12px; pointer-events: none; }
  #topbar-actions-cell { grid-column: 1; grid-row: 2; display: flex; align-items: center; padding: 0 8px; }
  /* no-drag: this cell hosts the scrolling filmstrip. If the drag region
     from #topbar were allowed to show through the gaps between thumbnails,
     every time the mouse crossed one of those gaps while wheel-scrolling
     the strip, the OS would treat it as a potential window-drag gesture,
     which is what caused the scroll stutter. Taking the whole cell out of
     the drag region (not just each .fs-thumb) fixes that for good. */
  #topbar-filmstrip-cell { grid-column: 2; grid-row: 1 / 3; min-width: 0; overflow: hidden; -webkit-app-region: no-drag; }
  #topbar-winbtns-cell { grid-column: 3; grid-row: 1; display: flex; align-items: center; justify-content: flex-end; gap: 6px; padding: 0 8px; }
  #topbar-history-cell { grid-column: 3; grid-row: 2; display: flex; align-items: center; justify-content: flex-end; padding: 0 8px; }
  .titlebar-logo { font-size: 13px; font-weight: 700; color: var(--text-bright); letter-spacing: -0.5px; }
  .titlebar-logo span { color: var(--accent); }
  .winbtn {
    width: 28px; height: 20px; border-radius: 3px; border: 1px solid var(--border2); background: var(--bg3);
    cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-dim);
    transition: all 0.1s;
  }
  .winbtn:hover { background: var(--bg4); color: var(--text); }
  .winbtn.close:hover { background: #6e2020; border-color: #8b3333; color: #ffaaaa; }
  .winbtn svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .winbtn { -webkit-app-region: no-drag; }

  .quick-actions {
    display: flex; align-items: center; gap: 3px; flex-shrink: 0; background: var(--bg2);
    border: 1px solid var(--border2); border-radius: 6px; padding: 4px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 2px 4px rgba(0,0,0,0.3);
    -webkit-app-region: no-drag;
  }
  .qa-btn {
    width: 28px; height: 28px; border: 1px solid transparent; background: transparent; border-radius: 4px;
    display: flex; align-items: center; justify-content: center; color: var(--text-dim); cursor: pointer;
    position: relative; transition: all .12s; flex-shrink: 0;
  }
  .qa-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
  .qa-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .qa-btn .tool-tooltip { left: 50%; top: calc(100% + 8px); transform: translateX(-50%); }
  /* A dedicated class (NOT the .history-mini-btn used by the undo/redo
     buttons in the history dock — that one is flex:1 and was stretching
     this button edge-to-edge). */
  .history-toggle-btn {
    width: 24px; height: 24px; flex-shrink: 0; border: 1px solid var(--border2); background: var(--bg2);
    border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--text-dim);
    cursor: pointer; position: relative; transition: all .12s;
    -webkit-app-region: no-drag;
  }
  .history-toggle-btn:hover { background: var(--bg4); color: var(--text); }
  .history-toggle-btn.active { background: var(--accent-faint); color: var(--accent); border-color: var(--accent-dim); }
  .history-toggle-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  .history-toggle-btn .tool-tooltip { left: auto; right: 0; top: calc(100% + 8px); transform: none; }

  /* MAIN ROW */
  #main-row { flex: 1; display: flex; overflow: hidden; position: relative; }

  /* TOOLBAR */
  #toolbar {
    width: var(--toolbar-w); background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 4px;
    flex-shrink: 0; z-index: 80;
  }
  .tool-btn {
    width: 30px; height: 30px; border: 1px solid transparent; background: transparent; border-radius: 5px;
    display: flex; align-items: center; justify-content: center; color: var(--text-dim); cursor: pointer;
    position: relative; transition: all .12s; flex-shrink: 0;
  }
  .tool-btn:hover { background: var(--bg4); color: var(--text); }
  .tool-btn.active { background: var(--accent-faint); color: var(--accent); border-color: var(--accent-dim); }
  .tool-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .tool-sep { width: 22px; height: 1px; background: var(--border2); margin: 4px 0; flex-shrink: 0; }
  .tool-tooltip {
    position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
    background: var(--bg5); border: 1px solid var(--border2); color: var(--text-bright); font-size: 10px;
    padding: 3px 7px; border-radius: 3px; white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity .12s; z-index: 500;
  }
  .tool-btn:hover .tool-tooltip, .qa-btn:hover .tool-tooltip, .history-toggle-btn:hover .tool-tooltip { opacity: 1; }
  /* Auto-advance + hotkey guide live pinned to the bottom of the toolbar,
     out of the way of the tools but always one click away. */
  .toolbar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }

  /* FILMSTRIP — lives in the topbar's middle column now, spanning both
     rows, between the quick-actions and
     the mini history button. */
  #filmstrip-track {
    width: 100%; height: 100%; min-width: 0; display: flex; align-items: center; gap: 6px;
    overflow-x: auto; overflow-y: hidden;
    /* No CSS `scroll-behavior: smooth` here on purpose: with it on, every
       single wheel tick (a trackpad can fire dozens per second) queues its
       own smoothed scroll animation that the next tick immediately
       interrupts, which is what made this feel janky rather than fluid.
       Wheel-driven scrolling below sets scrollLeft directly (instant,
       1:1 with input); smooth easing is applied explicitly, only for the
       "jump to active thumbnail" case, via scrollIntoView's own
       `behavior: 'smooth'` option. */
    /* Top/bottom padding is intentionally uneven (not 10px/10px): hiding the
       scrollbar just below reclaims the strip of height it used to occupy,
       and rather than let the thumbnails simply grow into all of it, part
       of that reclaimed space is spent as extra top padding so the whole
       row sits a little lower in the cell — same overall cell height as
       before, nothing added, just reallocated. */
    padding: 15px 8px 5px; margin: 0;
    /* Hide the scrollbar itself — the strip still scrolls (wheel handler
       below + native drag), it just doesn't need a visible scrollbar to do
       it, and showing one here only ate into the thumbnail height. */
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* legacy Edge/IE */
  }
  #filmstrip-track::-webkit-scrollbar { display: none; width: 0; height: 0; }
  /* Each thumb keeps the image's real aspect ratio (set inline per-image via
     JS) instead of forcing every image into one uniform box shape — a
     vertical shot reads as a tall sliver, a panorama as a wide strip. */
  .fs-thumb {
    position: relative; flex-shrink: 0; height: 100%; border-radius: 4px; overflow: hidden;
    border: 1.5px solid var(--border2); cursor: pointer; background: #000; box-sizing: border-box;
    -webkit-app-region: no-drag;
  }
  .fs-thumb canvas { width: 100%; height: 100%; display: block; }
  .fs-thumb:hover { border-color: var(--accent-dim); }
  .fs-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-faint); }
  .fs-thumb.multi-selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
  .fs-dot { position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .fs-empty { font-size: 10px; color: var(--text-dim); padding: 0 8px; white-space: nowrap; -webkit-app-region: no-drag; }


  /* CANVAS AREA — the subtle accent outline now wraps the entire canvas,
     not just its shared edge with the gallery rail. */
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden; cursor: grab;
    background: var(--bg); border: 1px solid var(--accent-subtle);
  }
  #canvas-wrap.grab-cursor { cursor: grab; }
  #canvas-wrap.grabbing-cursor { cursor: grabbing; }
  #canvas-wrap.tool-crosshair { cursor: crosshair; }
  /* Large fixed-size layer, way bigger than any viewport, centered on the
     image's origin and panned with the exact same transform as the image
     itself — reads as an "infinite" checkerboard that's actually locked to
     the image's pixel grid, rather than being clipped to the image's own
     (opaque, so invisible-through) bounds. */
  #grid-layer {
    position: absolute; top: -3000px; left: -3000px; width: 6000px; height: 6000px;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; background-position: 3000px 3000px;
    pointer-events: none; z-index: 1;
  }
  #image-container { position: absolute; top: 0; left: 0; z-index: 2; }
  #main-canvas { display: none; image-rendering: pixelated; box-shadow: 0 4px 32px rgba(0,0,0,0.6); }

  /* Must paint above #grid-layer, or the grid lines show through the
     "drop images here" prompt when the app opens with no image loaded. */
  #drop-zone {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; color: var(--text-dim); pointer-events: none; text-align: center;
    z-index: 3;
  }
  #drop-zone.has-image { display: none; }
  #canvas-wrap.dragover #drop-zone { color: var(--accent); }
  .drop-icon svg { width: 38px; height: 38px; stroke: currentColor; fill: none; stroke-width: 1.2; }
  .drop-hint-btn {
    pointer-events: all; padding: 6px 14px; border: 1px solid var(--border2); border-radius: 4px;
    background: var(--bg3); color: var(--text); cursor: pointer; font-family: var(--font); font-size: 11px;
  }
  .drop-hint-btn:hover { background: var(--bg4); border-color: var(--accent-dim); color: var(--accent); }

  #sel-rect-el {
    position: absolute; border: 1px dashed var(--accent); background: rgba(0,212,160,0.08);
    pointer-events: none; display: none; z-index: 6;
  }
  #sel-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 6; }
  #sel-path-el { stroke: var(--accent); stroke-width: 1.2; stroke-dasharray: 4 3; fill: rgba(0,212,160,0.08); }
  /* Committed selection(s) — rendered as a translucent mask fill rather than
     a vector outline, since a union/subtract of multiple shapes (rect +
     lasso, etc.) can't be described by one simple path. Lives inside
     #image-container so it inherits the same pan/zoom transform as the
     image, and paints above the image but below the live drag preview. */
  #sel-mask-canvas { position: absolute; top: 0; left: 0; pointer-events: none; display: none; z-index: 4; }

  /* FILTER PANELS */
  .filter-panel {
    position: absolute; top: 10px; left: 10px; width: 230px; background: var(--bg2);
    border: 1px solid var(--border2); border-radius: 6px; box-shadow: 0 8px 28px rgba(0,0,0,.5);
    padding: 10px; z-index: 150; display: none;
  }
  .filter-panel.open { display: block; }
  .fp-head { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-bright); margin-bottom: 8px; font-weight: 600; }
  .fp-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 15px; line-height: 1; }
  .fp-close:hover { color: var(--text); }
  .fp-label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
  .fp-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .fp-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .fp-row input[type=number] {
    width: 46px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    border-radius: 3px; padding: 3px 4px; font-family: var(--font); font-size: 11px;
  }
  .fp-apply {
    width: 100%; padding: 6px; border: 1px solid var(--accent-dim); background: var(--accent-faint);
    color: var(--accent); border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 11px; margin-bottom: 8px;
  }
  .fp-apply:hover { background: rgba(0,212,160,0.16); }
  .fp-apply:disabled { opacity: 0.5; cursor: default; pointer-events: none; }
  .fp-apply:disabled:hover { background: var(--accent-faint); }
  .fp-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .fp-presets-label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .preset-row { display: flex; align-items: center; gap: 4px; padding: 4px 2px; border-bottom: 1px solid var(--border); }
  .preset-row:last-child { border-bottom: none; }
  .preset-val { font-size: 11px; color: var(--text); width: 38px; flex-shrink: 0; }
  .preset-key {
    flex: 1; font-size: 10px; color: var(--text-dim); background: var(--bg3); border: 1px solid var(--border);
    border-radius: 3px; padding: 3px 5px; text-align: center; cursor: pointer; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .preset-key:hover { border-color: var(--border2); color: var(--text); }
  .preset-key.armed { color: var(--gold); border-color: var(--gold); }
  .preset-btn {
    width: 20px; height: 20px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text-dim);
    border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0;
  }
  .preset-btn:hover { background: var(--bg4); color: var(--text); }
  .preset-btn.danger:hover { background: #6e2020; color: #ffaaaa; border-color: #8b3333; }
  .fp-add-preset {
    width: 100%; margin-top: 6px; padding: 5px; border: 1px dashed var(--border2); background: transparent;
    color: var(--text-dim); border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 10px;
  }
  .fp-add-preset:hover { color: var(--text); border-color: var(--accent-dim); }
  .fp-empty { font-size: 10px; color: var(--text-dim); text-align: center; padding: 8px 0; }

  /* HOTKEY GUIDE — read-only reference, lives bottom-left near the toolbar
     rather than top-left like the pixelate/blur panels (which hold live
     controls). Wider than the other filter panels, and its body scrolls,
     since the full shortcut list is too long to always fit on screen. */
  #panel-hotkeys { top: auto; bottom: 10px; left: 10px; width: 280px; max-height: 80vh; display: none; flex-direction: column; }
  #panel-hotkeys.open { display: flex; }
  #hotkey-guide-body { flex: 1; min-height: 0; overflow-y: auto; padding-right: 2px; }
  .hk-group-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; margin: 8px 0 4px; }
  .hk-group-title:first-of-type { margin-top: 0; }
  .hk-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 4px 2px; font-size: 11.5px; color: var(--text); }
  .hk-row span { flex: 1; }
  .hk-row kbd {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 1px 6px;
    color: var(--accent); font-family: var(--font); font-size: 10px;
  }

  /* DOCKED PANELS — History stacked above Categories, split 2/3 (history) to
     1/3 (categories) of the rail's vertical space. */
  .dock-section { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .dock-history { flex: 2 1 0; min-height: 0; border-bottom: 1px solid var(--border); }
  .dock-history.collapsed { flex: 0 0 0; min-height: 0; overflow: hidden; border-bottom: none; }
  .dock-gallery { flex: 1 1 0; min-height: 0; }
  .dock-head { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .dock-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; }
  .dock-collapse-btn {
    width: 18px; height: 18px; border-radius: 3px; border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1; flex-shrink: 0;
  }
  .dock-collapse-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--accent-dim); }
  .history-mini-controls { display: flex; gap: 5px; padding: 7px 8px 5px; flex-shrink: 0; }
  .history-mini-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 5px;
    border: 1px solid var(--border2); background: var(--bg3); color: var(--text); border-radius: 4px;
    cursor: pointer; font-family: var(--font); font-size: 10px;
  }
  .history-mini-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .history-mini-btn:hover:not(:disabled) { background: var(--bg4); border-color: var(--accent-dim); color: var(--accent); }
  .history-mini-btn:disabled { opacity: .35; cursor: default; }
  #history-list { flex: 1; overflow-y: auto; padding: 2px 6px 6px; display: flex; flex-direction: column; gap: 1px; }
  .history-item {
    padding: 4px 7px; border-radius: 4px; font-size: 10.5px; color: var(--text-dim); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-item:hover { background: var(--bg4); color: var(--text); }
  .history-item.current { background: var(--accent-faint); color: var(--accent); font-weight: 600; }
  .history-item.future { opacity: .5; }
  .history-empty { font-size: 10px; color: var(--text-dim); text-align: center; padding: 10px 0; }

  /* GALLERY PANEL — a shade lighter than the toolbar/canvas, so the rail
     visually stands out as its own region rather than blending into the
     rest of the chrome. */
  /* GALLERY PANEL — a shade lighter than the toolbar/canvas, so the rail
     visually stands out as its own region rather than blending into the
     rest of the chrome. A normal flex child of #main-row — it only spans
     the canvas row's height, never the titlebar or action-row above it. */
  #gallery-panel {
    width: var(--gallery-w); background: var(--bg3); border-left: 1px solid var(--border);
    box-shadow: -6px 0 16px -8px rgba(0,0,0,0.5) inset;
    display: flex; flex-direction: column; flex-shrink: 0; transition: width .15s ease; overflow: hidden; z-index: 60;
  }
  #gallery-panel.state-hidden { width: 0; border-left: none; }
  .gallery-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .gallery-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; }
  .gallery-head-actions { display: flex; align-items: center; gap: 8px; }
  .gallery-save-all-icon {
    width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--bg3); color: var(--text-dim); border-radius: 4px; cursor: pointer;
  }
  .gallery-save-all-icon svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .gallery-save-all-icon:hover:not(:disabled) { border-color: var(--accent-dim); color: var(--accent); }
  .gallery-save-all-icon:disabled { opacity: .35; cursor: default; }

  /* CATEGORIES — replaces the old flat "open images" list. Images with no
     category sit unlabeled at the top (still functionally a bucket, just
     not chromed like a real category); named categories are collapsible,
     rename-by-double-click, and accept drag-and-drop from any thumbnail. */
  .cat-add-row { padding: 8px 8px 0; flex-shrink: 0; }
  .cat-add-input {
    width: 100%; background: var(--bg3); border: 1px dashed var(--border2); color: var(--text);
    border-radius: 4px; padding: 5px 8px; font-family: var(--font); font-size: 11px; box-sizing: border-box;
  }
  .cat-add-input:focus { outline: none; border-color: var(--accent-dim); border-style: solid; }
  /* Each category is a full-width row, stacked in a vertical list — not a
     wrapped row of pills. Name sits on the left, image count on the right,
     both inside the same button. The "All" row is always present, pinned to
     the top, and represents every open image regardless of category. */
  #category-list { flex: 1; min-height: 0; overflow-y: auto; padding: 6px 8px 8px; display: flex; flex-direction: column; gap: 4px; }
  .cat-pill {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    width: 100%; padding: 8px 10px; border-radius: 5px; box-sizing: border-box;
    border: 1px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer;
    font-size: 11px; font-family: var(--font); user-select: none; transition: all .1s;
  }
  .cat-pill:hover { border-color: var(--accent-dim); }
  .cat-pill.filter-active { background: var(--accent-faint); color: var(--accent); border-color: var(--accent-dim); }
  .cat-pill.drag-over { box-shadow: 0 0 0 2px var(--accent) inset; background: var(--accent-faint); }
  .cat-pill.cat-all { font-weight: 600; }
  .cat-pill-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; flex: 1; text-align: left; }
  .cat-pill-count {
    flex-shrink: 0; font-size: 10px; color: var(--text-dim); background: var(--bg4);
    border-radius: 3px; padding: 1px 6px; min-width: 16px; text-align: center;
  }
  .cat-pill.filter-active .cat-pill-count { color: var(--accent); }
  .cat-rename-input {
    background: var(--bg4); border: 1px solid var(--accent-dim); color: var(--text-bright);
    border-radius: 3px; padding: 2px 5px; font-family: var(--font); font-size: 10.5px; width: 100%;
  }
  .cat-rename-input:focus { outline: none; }
  .gallery-empty { color: var(--text-dim); font-size: 10px; text-align: center; padding: 20px 8px; width: 100%; }

  /* CONTEXT MENU (category right-click: save all / rename / delete) */
  #context-menu {
    position: fixed; z-index: 2000; display: none; background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 6px; padding: 4px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  #context-menu.open { display: block; }
  #context-menu button {
    display: block; width: 100%; text-align: left; padding: 7px 10px; border: none; background: none;
    color: var(--text); border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 11px;
  }
  #context-menu button:hover { background: var(--bg5); color: var(--accent); }
  #context-menu button.danger:hover { background: #6e2020; color: #ffaaaa; }
  #context-menu .cm-sep { height: 1px; background: var(--border2); margin: 4px 2px; }

  /* STATUS BAR */
  #statusbar {
    height: var(--statusbar-h); background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 10px; gap: 14px; flex-shrink: 0; font-size: 10px; color: var(--text-dim); z-index: 80;
    position: relative;
  }
  /* Thin progress line along the top edge of the status bar, shown only
     while a batch of images is being decoded in the background (folder
     open, drag-drop of many files). Kept out of normal flow so it never
     shifts the status text/zoom box around. */
  #sb-progress-track {
    position: absolute; left: 0; top: -1px; height: 2px; width: 100%;
    background: transparent; pointer-events: none; overflow: hidden;
  }
  #sb-progress-fill {
    height: 100%; width: 0%; background: var(--accent); transition: width .1s linear;
  }
  #sb-file { cursor: pointer; color: var(--text); flex-shrink: 0; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sb-file:hover { color: var(--accent); text-decoration: underline; }
  #sb-status { flex: 1; text-align: center; transition: color .15s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sb-status.ok { color: var(--accent); }
  #sb-status.fail { color: #ff6b6b; }
  #sb-zoom {
    width: 46px; background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 3px; padding: 2px 4px; font-family: var(--font); font-size: 10px; text-align: right; flex-shrink: 0;
  }

  /* OVERLAYS */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .overlay.open { display: flex; }
  .overlay-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 16px; width: 280px; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
  .meta-title { font-size: 12px; color: var(--text-bright); margin-bottom: 10px; font-weight: 600; word-break: break-all; }
  .meta-row { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; font-size: 11px; }
  .meta-key { color: var(--text-dim); flex-shrink: 0; }
  .meta-val { color: var(--text); text-align: right; word-break: break-all; }
  .meta-sep { height: 1px; background: var(--border); margin: 6px 0; }
  .overlay-close { width: 100%; margin-top: 10px; padding: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 11px; }
  .overlay-close:hover { background: var(--bg4); }
  /* FULL METADATA — collapsed by default; the raw dump is only read off
     disk and parsed the first time this is opened (see toggleFullMeta), so
     it costs nothing for people who never click it. */
  .meta-full-toggle {
    width: 100%; margin-top: 8px; padding: 6px; border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text-dim); border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 10px;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .meta-full-toggle:hover { background: var(--bg4); color: var(--text); }
  .meta-full-toggle svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; transition: transform .12s; }
  .meta-full-toggle.open svg { transform: rotate(180deg); }
  #meta-full-body {
    display: none; margin-top: 8px; max-height: 260px; overflow-y: auto;
    border-top: 1px solid var(--border); padding-top: 6px;
  }
  #meta-full-body.open { display: block; }
  #meta-full-body .meta-row { padding: 3px 0; gap: 14px; }
  #meta-full-body .meta-key { word-break: break-word; }
  /* Some embedded metadata (e.g. a ComfyUI/A1111 generation-prompt JSON
     blob stuffed into a PNG tEXt chunk) can run to thousands of characters
     — squeezing that into the key/value row layout above is unreadable.
     Anything long gets its own full-width, resizable, scrollable textarea
     instead. Not trying to be pretty here, just usable: this path is rare
     and purely functional — copy/paste and "make the box bigger" is the
     whole job. */
  .meta-full-longval { margin: 6px 0 10px; }
  .meta-full-longval .meta-key { display: block; margin-bottom: 4px; font-size: 10px; }
  .meta-full-longval textarea {
    width: 100%; min-height: 90px; max-height: 320px; resize: vertical;
    background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
    color: var(--text); font-family: var(--font); font-size: 10px; line-height: 1.5;
    padding: 6px; white-space: pre-wrap; word-break: break-word;
    user-select: text; -webkit-user-select: text;
  }
  .meta-full-loading { font-size: 10px; color: var(--text-dim); text-align: center; padding: 8px 0; }
  /* A bit wider than the other overlays specifically — the full-metadata
     textareas above read a lot better with the extra room. */
  #overlay-meta .overlay-box { width: 320px; }
  .confirm-msg { font-size: 11px; color: var(--text); margin-bottom: 14px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-btns button { flex: 1; padding: 7px; border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 11px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); }
  .confirm-btns button.danger { border-color: #8b3333; color: #ffaaaa; }
  .confirm-btns button.danger:hover { background: #6e2020; }
  .confirm-btns button.primary { border-color: var(--accent-dim); background: var(--accent-faint); color: var(--accent); }
  .confirm-btns button.primary:hover { background: rgba(0,212,160,0.16); }
  .confirm-btns button:not(.danger):not(.primary):hover { background: var(--bg4); }
  select.cat-add-input { cursor: pointer; }

  /* HIDE ALL UI */
  body.ui-hidden #toolbar, body.ui-hidden #statusbar, body.ui-hidden #gallery-panel,
  body.ui-hidden .filter-panel.open {
    display: none !important;
  }
  /* Collapse the topbar down to just the window-control row — logo and
     winbtns stay reachable, everything else (quick-actions, filmstrip,
     history) goes away with the rest of the UI. */
  body.ui-hidden #topbar { grid-template-rows: var(--titlebar-h) 0; }
  body.ui-hidden #topbar-actions-cell, body.ui-hidden #topbar-filmstrip-cell, body.ui-hidden #topbar-history-cell {
    display: none;
  }
  body.ui-hidden #canvas-wrap { border: none; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR — one grid instead of two stacked rows. Left and right columns
       are each split top/bottom (logo+winbtns / quick-actions+history), but
       the middle column — the filmstrip — spans both rows, so it gets the
       full combined height instead of being boxed into a single row. -->
  <div id="topbar">
    <div id="topbar-logo-cell">
      <span class="titlebar-logo">vael.<span>editor</span></span>
    </div>
    <div id="topbar-actions-cell">
      <div class="quick-actions">
        <button class="qa-btn" id="tool-open" onclick="triggerFileOpen()">
          <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          <span class="tool-tooltip">Open image(s)</span>
        </button>
        <button class="qa-btn" id="tool-open-folder" onclick="triggerOpenFolder()">
          <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 7V5a2 2 0 0 1 2-2h3l1.5 1.5"/></svg>
          <span class="tool-tooltip">Open folder…</span>
        </button>
        <button class="qa-btn" id="tool-save" onclick="saveImage()">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
          <span class="tool-tooltip">Save (Ctrl+S)</span>
        </button>
      </div>
    </div>
    <div id="topbar-filmstrip-cell">
      <div id="filmstrip-track" onwheel="onFilmstripWheel(event)"></div>
    </div>
    <div id="topbar-winbtns-cell">
      <button class="winbtn" onclick="winAction('minimize')"><svg viewBox="0 0 10 10"><line x1="1" y1="5" x2="9" y2="5"/></svg></button>
      <button class="winbtn" onclick="winAction('maximize')"><svg viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" rx="1"/></svg></button>
      <button class="winbtn close" onclick="winAction('close')"><svg viewBox="0 0 10 10"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5"/></svg></button>
    </div>
    <div id="topbar-history-cell">
      <button class="history-toggle-btn" id="tool-history" onclick="toggleHistoryPanel()">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 8v4l3 2"/></svg>
        <span class="tool-tooltip">History</span>
      </button>
    </div>
  </div>

  <div id="main-row">

    <!-- TOOLBAR -->
    <div id="toolbar">
      <button class="tool-btn" id="tool-move" onclick="pressR()">
        <svg viewBox="0 0 24 24"><path d="M12 3v18M3 12h18M12 3l-3 3m3-3 3 3M12 21l-3-3m3 3 3-3M3 12l3 3m-3-3 3-3M21 12l-3 3m3-3-3-3"/></svg>
        <span class="tool-tooltip">Move (R)</span>
      </button>
      <button class="tool-btn" id="tool-select" onclick="pressS()">
        <svg id="select-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" stroke-dasharray="4 2"/></svg>
        <span class="tool-tooltip" id="select-tooltip">Select: rect (S)</span>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="tool-pixelate" onclick="toggleFilterPanel('pixelate')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span class="tool-tooltip">Pixelate</span>
      </button>
      <button class="tool-btn" id="tool-blur" onclick="toggleFilterPanel('blur')">
        <svg viewBox="0 0 24 24"><circle cx="8" cy="9" r="4"/><circle cx="17" cy="8" r="2.5"/><circle cx="13" cy="16" r="3"/></svg>
        <span class="tool-tooltip">Bokeh blur</span>
      </button>

      <!-- Pinned to the bottom: auto-advance toggle + read-only hotkey guide -->
      <div class="toolbar-bottom">
        <button class="tool-btn active" id="tool-autoadvance" onclick="toggleAutoAdvance()">
          <svg viewBox="0 0 24 24"><path d="M5 4l8 8-8 8V4z"/><path d="M15 4l8 8-8 8V4z"/></svg>
          <span class="tool-tooltip" id="tool-autoadvance-tooltip">Auto-next after save: ON</span>
        </button>
        <button class="tool-btn" id="tool-hotkeys" onclick="toggleHotkeyGuide()">
          <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h0M10 10h0M14 10h0M18 10h0M6 14h4M14 14h4"/></svg>
          <span class="tool-tooltip">Hotkey guide</span>
        </button>
      </div>
    </div>

    <!-- CANVAS -->
    <div id="canvas-wrap"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
         onmousedown="onCanvasMouseDown(event)" onwheel="onWheel(event)" ondblclick="onCanvasDblClick(event)">

      <div id="drop-zone">
        <div class="drop-icon"><svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
        <div>drop images here</div>
        <button class="drop-hint-btn" onclick="triggerFileOpen()">open files…</button>
      </div>

      <div id="grid-layer"></div>
      <div id="image-container"><canvas id="main-canvas"></canvas><canvas id="sel-mask-canvas"></canvas></div>

      <div id="sel-rect-el"></div>
      <svg id="sel-svg"><path id="sel-path-el"></path></svg>


      <!-- PIXELATE PANEL (top-left of canvas, exactly like the original layout) -->
      <div class="filter-panel" id="panel-pixelate">
        <div class="fp-head">Pixelate <button class="fp-close" onclick="toggleFilterPanel('pixelate')">×</button></div>
        <div class="fp-label">block size (px)</div>
        <div class="fp-row">
          <input type="range" id="pixelate-range" min="2" max="100" value="12" oninput="syncFilterValue('pixelate', this.value)">
          <input type="number" id="pixelate-num" min="2" max="100" value="12" oninput="syncFilterValue('pixelate', this.value)">
        </div>
        <button class="fp-apply" onclick="runFilter('pixelate')">Apply to selection</button>
        <div class="fp-divider"></div>
        <div class="fp-presets-label">Presets</div>
        <div id="pixelate-presets"></div>
        <button class="fp-add-preset" onclick="addPreset('pixelate')">+ save current as preset</button>
      </div>

      <!-- BLUR PANEL -->
      <div class="filter-panel" id="panel-blur">
        <div class="fp-head">Bokeh Blur <button class="fp-close" onclick="toggleFilterPanel('blur')">×</button></div>
        <div class="fp-label">radius (px)</div>
        <div class="fp-row">
          <input type="range" id="blur-range" min="1" max="50" value="6" oninput="syncFilterValue('blur', this.value)">
          <input type="number" id="blur-num" min="1" max="50" value="6" oninput="syncFilterValue('blur', this.value)">
        </div>
        <button class="fp-apply" onclick="runFilter('blur')">Apply to selection</button>
        <div class="fp-divider"></div>
        <div class="fp-presets-label">Presets</div>
        <div id="blur-presets"></div>
        <button class="fp-add-preset" onclick="addPreset('blur')">+ save current as preset</button>
      </div>

      <!-- HOTKEY GUIDE (bottom-left, near the toolbar button that opens it) -->
      <div class="filter-panel" id="panel-hotkeys">
        <div class="fp-head">Hotkeys <button class="fp-close" onclick="toggleHotkeyGuide()">×</button></div>
        <div id="hotkey-guide-body"></div>
      </div>

    </div>

    <!-- History gets 2/3 of the vertical space, categories the remaining 1/3.
         A normal flex child here — confined to the canvas row's height,
         never reaching up into the action-row or titlebar above it. -->
    <div id="gallery-panel" class="state-side">

      <div class="dock-section dock-history" id="history-dock">
        <div class="dock-head">
          <span class="dock-title">history</span>
          <button class="dock-collapse-btn" id="history-collapse-btn" onclick="toggleHistoryPanel()" title="Collapse history">▾</button>
        </div>
        <div class="history-mini-controls">
          <button class="history-mini-btn" id="undo-btn" onclick="undo()" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24"><path d="M3 11V5M3 11h7a6 6 0 1 1 0 12H7"/></svg> Undo
          </button>
          <button class="history-mini-btn" id="redo-btn" onclick="redo()" title="Redo (Ctrl+Y)">
            <svg viewBox="0 0 24 24"><path d="M21 11V5M21 11h-7a6 6 0 1 0 0 12h3"/></svg> Redo
          </button>
        </div>
        <div id="history-list"></div>
      </div>

      <div class="dock-section dock-gallery">
        <div class="gallery-head">
          <span class="gallery-title">categories</span>
          <div class="gallery-head-actions">
            <button class="gallery-save-all-icon" id="save-all-btn" onclick="saveAllChanges()" disabled title="Save all changes (every open image)">
              <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
            </button>
          </div>
        </div>
        <div class="cat-add-row">
          <input type="text" id="new-category-input" class="cat-add-input" placeholder="+ new category…" onkeydown="onNewCategoryKeydown(event)">
        </div>
        <div id="category-list" oncontextmenu="onCategoryListContextMenu(event)"></div>
      </div>

    </div>

  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div id="sb-progress-track"><div id="sb-progress-fill"></div></div>
    <span id="sb-file" onclick="openMetaPanel()" title="Click for image info">—</span>
    <span id="sb-status">Ready</span>
    <input id="sb-zoom" type="text" value="" onchange="setZoomInput(this.value)" title="Zoom %">
  </div>

</div>

<input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="onFileInput(event)">

<!-- METADATA OVERLAY -->
<div class="overlay" id="overlay-meta" onclick="closeMetaPanel(event)">
  <div class="overlay-box">
    <div class="meta-title" id="meta-filename">—</div>
    <div id="meta-body"></div>
    <button class="meta-full-toggle" id="meta-full-toggle" onclick="toggleFullMeta()">
      <span id="meta-full-toggle-label">show full metadata</span>
      <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div id="meta-full-body"></div>
    <button class="overlay-close" onclick="closeMetaPanelDirect()">close</button>
  </div>
</div>

<!-- CONFIRM OVERLAY -->
<div class="overlay" id="overlay-confirm">
  <div class="overlay-box">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button onclick="confirmAction('cancel')">cancel</button>
      <button class="danger" onclick="confirmAction('close')">close anyway</button>
    </div>
  </div>
</div>

<!-- CATEGORY IMPORT PROMPT: shown after opening 2+ loose images at once (a
     dropped/opened folder skips this entirely and is auto-named after the
     folder). The input is pre-filled with a standard default name and
     autofocused, so pressing Enter right away — without touching the field —
     files the batch under that default name. Typing first and then Enter
     uses the custom name instead. -->
<div class="overlay" id="overlay-category-prompt">
  <div class="overlay-box">
    <div class="confirm-msg" id="category-prompt-msg">Name a category for these images:</div>
    <input type="text" id="category-prompt-new-input" class="cat-add-input" placeholder="category name" onkeydown="onCategoryPromptInputKeydown(event)">
    <div class="confirm-btns" style="margin-top:12px;">
      <button onclick="categoryPromptAction('skip')">leave unsorted</button>
      <button class="primary" onclick="categoryPromptAction('confirm')">ok</button>
    </div>
  </div>
</div>

<!-- CATEGORY CONTEXT MENU: right-click a category pill -->
<div id="context-menu"></div>

<script>
// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════
const state = {
  images: [],
  activeIdx: -1,
  zoom: 1, panX: 0, panY: 0,
  isDragging: false, lastMx: 0, lastMy: 0,
  // Workflow always starts with a lasso selection, so that's the default
  // tool/shape rather than move+rect — matches "lasso select -> pixelate ->
  // save -> next image" out of the box, no setup needed each launch.
  currentTool: 'select',   // 'move' | 'select'
  selectShape: 'lasso',    // 'rect' | 'ellipse' | 'lasso'
  sel: null, lassoPoints: [], isDrawing: false, drawStartX: 0, drawStartY: 0,
  galleryState: 'side',    // 'hidden' | 'side' | 'expanded'
  multiSelected: new Set(), // indices ctrl-clicked in the gallery for batch operations
  categories: [],           // [{id, name, customName}] — persisted definitions
  categoryFilter: null,     // category id currently limiting the filmstrip, or null for "all"
  categoryRenamingId: null, // category id currently showing a rename input, or null
  categoryDragIdx: null,    // image index currently being dragged onto a category, or null
  uiHidden: false,
  confirmCallback: null,
  armingPreset: null,      // { type, idx } while capturing a hotkey
  filterBusy: false,       // true while a bokeh blur worker job is in flight
  autoAdvance: true,       // jump to the next image automatically after a save
  historyCollapsed: false, // docked history panel collapsed to save side-rail space
  _rafId: null, _dirtyTransform: false, _dirtySelDisplay: false, _statusThrottle: 0,
  _importTotal: 0, _importDone: 0, // drives the "Importing images [x/y]" status + progress bar
};

const FILTER_DEFAULTS = { pixelate: 12, blur: 6 };
const FILTER_RANGE = { pixelate: [2, 100], blur: [1, 50] };
const SHAPES = ['rect', 'ellipse', 'lasso'];
const SHAPE_ICONS = {

  for (let y0 = by0; y0 < by1; y0 += bandH) out.push({ y0, y1: Math.min(by1, y0 + bandH) });
  return out;
}
async function runPixelateAsync(w, h, imageData, mask, blockSize, bounds) {
  const pool = getPixelatePool();
  const bx0 = bounds.x, by0 = bounds.y, bx1 = bounds.x + bounds.w, by1 = bounds.y + bounds.h;
  const bands = computePixelateBands(by0, by1, blockSize, pool.length);
  const srcData = imageData.data;
  const dst = new Uint8ClampedArray(srcData); // untouched rows/pixels pass through as-is

  const jobs = bands.map((band, i) => {
    const subH = band.y1 - band.y0;
    const subData = srcData.slice(band.y0 * w * 4, band.y1 * w * 4);
    const subMask = mask ? mask.slice(band.y0 * w, band.y1 * w) : null;
    const worker = pool[i % pool.length];
    // Band-local coordinates: rows are relative to band.y0, x range unchanged.
    return runPixelateBandOnWorker(worker, w, subH, subData.buffer, subMask ? subMask.buffer : null, blockSize, bx0, 0, bx1, subH)
      .then(resultBand => { dst.set(resultBand, band.y0 * w * 4); });
  });
  await Promise.all(jobs);
  return dst;
}
// Async, worker-pool-backed replacement for the old synchronous
// pixelateSelection. Same effect on img — reads current pixels + mask,
// writes the pixelated result back via putImageData — just non-blocking.
async function pixelateSelection(img, blockSize) {
  const { w, h, ctx, mask } = img;
  const bounds = maskBounds(mask, w, h);
  const src = ctx.getImageData(0, 0, w, h);
  const resultData = await runPixelateAsync(w, h, src, mask, blockSize, bounds);
  const dst = new ImageData(resultData, w, h);
  ctx.putImageData(dst, 0, 0);
  markDirty(img);
}

// "Quality" in a disc/bokeh blur isn't about the blur's reach — it's how
// many concentric rings approximate the disc's falloff. One ring (quality 1)
// is a single hard-edged circle: uniform weight, sharp cutoff at the radius.
// Three rings blend nested circles of decreasing weight outward, so the
// contribution tapers off instead of cutting off abruptly — same radius,
// softer result. Fixed at 3 rings; not exposed as a setting.
const BOKEH_RINGS = [
  { ratio: 0.40, weight: 3 },
  { ratio: 0.70, weight: 2 },
  { ratio: 1.00, weight: 1 },
];

// Pure pixel-crunching core: (w, h, srcData, mask, radius) -> Uint8ClampedArray.
// No DOM/canvas access, so this same source can run on the main thread or be
// shipped into a Web Worker verbatim (see BOKEH_WORKER_SRC below) — both call
// sites execute byte-for-byte the same code, so results are guaranteed
// identical regardless of where it runs.
//
// Perf notes (output is bit-for-bit identical to the straightforward version —
// these are mechanical speedups, not algorithm changes):
//   - Ring half-widths are split into 3 typed arrays (halfW0/1/2) instead of an
//     array-of-arrays, and the 3-ring loop is unrolled, removing per-pixel
//     array-of-array indexing and a branch-per-ring.
//   - The x0/x1 edge clamp (Math.max/Math.min) is skipped for the "interior"
//     columns where clamping is a no-op — i.e. almost every column except a
//     `half`-wide strip at the left/right edges.
function bokehBlurCore(w, h, srcData, mask, radius) {
  const data = srcData;
  const dst = new Uint8ClampedArray(data.length);
  dst.set(data);
  const r = Math.max(1, Math.round(radius));
  const n = w * h;

  // Bright pixels get boosted so highlights bloom into round bokeh discs
  // instead of being diluted by averaging with darker neighbors.
  const weight = new Float64Array(n);
  const wR = new Float64Array(n), wG = new Float64Array(n), wB = new Float64Array(n), wA = new Float64Array(n);
  const THRESH = 190;
  for (let i = 0; i < n; i++) {
    const di = i * 4;
    const R = data[di], G = data[di + 1], B = data[di + 2], A = data[di + 3];
    const lum = 0.299 * R + 0.587 * G + 0.114 * B;
    const wgt = lum > THRESH ? 1 + Math.pow((lum - THRESH) / (255 - THRESH), 2) * 5 : 1;
    weight[i] = wgt;
    wR[i] = R * wgt; wG[i] = G * wgt; wB[i] = B * wgt; wA[i] = A * wgt;
  }

  // Per row offset, the half-width of each of the 3 rings (-1 = ring doesn't
  // reach this row at all). Built once per blur call, reused for every pixel.
  // Split into typed arrays (one per ring) instead of an array-of-arrays —
  // same values as the original ringHalfW[k] = [h0,h1,h2], just laid out for
  // faster access in the hot loop below.
  const kRows = 2 * r + 1;
  const halfW0 = new Int32Array(kRows).fill(-1);
  const halfW1 = new Int32Array(kRows).fill(-1);
  const halfW2 = new Int32Array(kRows).fill(-1);
  for (let k = 0; k < kRows; k++) {
    const dy = k - r;
    const ady = Math.abs(dy);
    { const rk = BOKEH_RINGS[0].ratio * r; if (ady <= rk) halfW0[k] = Math.floor(Math.sqrt(Math.max(0, rk * rk - dy * dy))); }
    { const rk = BOKEH_RINGS[1].ratio * r; if (ady <= rk) halfW1[k] = Math.floor(Math.sqrt(Math.max(0, rk * rk - dy * dy))); }
    { const rk = BOKEH_RINGS[2].ratio * r; if (ady <= rk) halfW2[k] = Math.floor(Math.sqrt(Math.max(0, rk * rk - dy * dy))); }
  }
  const RW0 = BOKEH_RINGS[0].weight, RW1 = BOKEH_RINGS[1].weight, RW2 = BOKEH_RINGS[2].weight;

  // Row-prefix-sum cache keyed by SOURCE row index (sy), not by kernel slot.
  // As the destination row y advances by 1, the window of needed sy values
  // shifts by 1 — almost all of them were already built for the previous y.
  // A small ring of (2r+1) slots holds the currently-cached rows; we only
  // ever build a row once and reuse it for every y that needs it, dropping
  // this from O(w*h*r) row-builds to O(w*h) total (one new row per y, plus
  // the initial window fill). The per-pixel range-query math below is
  // byte-for-byte the same as the original implementation, so output is
  // identical — only the bookkeeping that fills the prefix buffers changed.
  const slotCount = kRows;
  const prefR = [], prefG = [], prefB = [], prefA = [], prefWt = [];
  for (let s = 0; s < slotCount; s++) {
    prefR.push(new Float64Array(w + 1)); prefG.push(new Float64Array(w + 1)); prefB.push(new Float64Array(w + 1));
    prefA.push(new Float64Array(w + 1)); prefWt.push(new Float64Array(w + 1));
  }
  const slotForSy = new Map();   // sy -> slot index currently holding it
  const syInSlot = new Int32Array(slotCount).fill(-1); // slot index -> sy it holds
  let nextSlot = 0; // round-robin eviction; always evicts the row no longer needed

  function buildRow(sy) {
    const slot = nextSlot;
    nextSlot = (nextSlot + 1) % slotCount;
    const evicted = syInSlot[slot];
    if (evicted >= 0) slotForSy.delete(evicted);
    syInSlot[slot] = sy;
    slotForSy.set(sy, slot);

    const rowBase = sy * w;
    const pR = prefR[slot], pG = prefG[slot], pB = prefB[slot], pA = prefA[slot], pW = prefWt[slot];
    let ar = 0, ag = 0, ab = 0, aa = 0, aw = 0;
    pR[0] = 0; pG[0] = 0; pB[0] = 0; pA[0] = 0; pW[0] = 0;
    for (let xx = 0; xx < w; xx++) {
      const ii = rowBase + xx;
      ar += wR[ii]; ag += wG[ii]; ab += wB[ii]; aa += wA[ii]; aw += weight[ii];
      pR[xx + 1] = ar; pG[xx + 1] = ag; pB[xx + 1] = ab; pA[xx + 1] = aa; pW[xx + 1] = aw;
    }
    return slot;
  }

  function slotForRow(sy) {
    const cached = slotForSy.get(sy);
    return cached !== undefined ? cached : buildRow(sy);
  }

  // kSlot[k] = which slot currently holds the row needed at kernel offset k
  // for the destination row about to be processed. Recomputed each y.
  const kSlot = new Int32Array(kRows);
  const lastW = w - 1;

  for (let y = 0; y < h; y++) {
    // Touch rows for this y's window in ascending sy order so that, when
    // duplicates exist (clamped edge rows), the round-robin eviction below
    // never evicts a row this same window still needs.
    const sysThisRow = [];
    for (let k = 0; k < kRows; k++) {
      sysThisRow.push(Math.max(0, Math.min(h - 1, y + (k - r))));
    }
    const uniqueSys = [...new Set(sysThisRow)];
    for (const sy of uniqueSys) slotForRow(sy);
    for (let k = 0; k < kRows; k++) kSlot[k] = slotForSy.get(sysThisRow[k]);

    const rowBase = y * w;

    for (let x = 0; x < w; x++) {
      const mi = rowBase + x;
      if (mask && !mask[mi]) continue;
      let totR = 0, totG = 0, totB = 0, totA = 0, totW = 0;

      for (let k = 0; k < kRows; k++) {
        const slot = kSlot[k];
        const pR = prefR[slot], pG = prefG[slot], pB = prefB[slot], pA = prefA[slot], pWt = prefWt[slot];

        let half = halfW0[k];
        if (half >= 0) {
          let x0, x1;
          if (x >= half && x + half <= lastW) { x0 = x - half; x1 = x + half; }
          else { x0 = x - half; if (x0 < 0) x0 = 0; x1 = x + half; if (x1 > lastW) x1 = lastW; }
          totR += RW0 * (pR[x1 + 1] - pR[x0]);
          totG += RW0 * (pG[x1 + 1] - pG[x0]);
          totB += RW0 * (pB[x1 + 1] - pB[x0]);
          totA += RW0 * (pA[x1 + 1] - pA[x0]);
          totW += RW0 * (pWt[x1 + 1] - pWt[x0]);
        }
        half = halfW1[k];
        if (half >= 0) {
          let x0, x1;
          if (x >= half && x + half <= lastW) { x0 = x - half; x1 = x + half; }
          else { x0 = x - half; if (x0 < 0) x0 = 0; x1 = x + half; if (x1 > lastW) x1 = lastW; }
          totR += RW1 * (pR[x1 + 1] - pR[x0]);
          totG += RW1 * (pG[x1 + 1] - pG[x0]);
          totB += RW1 * (pB[x1 + 1] - pB[x0]);
          totA += RW1 * (pA[x1 + 1] - pA[x0]);
          totW += RW1 * (pWt[x1 + 1] - pWt[x0]);
        }
        half = halfW2[k];
        if (half >= 0) {
          let x0, x1;
          if (x >= half && x + half <= lastW) { x0 = x - half; x1 = x + half; }
          else { x0 = x - half; if (x0 < 0) x0 = 0; x1 = x + half; if (x1 > lastW) x1 = lastW; }
          totR += RW2 * (pR[x1 + 1] - pR[x0]);
          totG += RW2 * (pG[x1 + 1] - pG[x0]);
          totB += RW2 * (pB[x1 + 1] - pB[x0]);
          totA += RW2 * (pA[x1 + 1] - pA[x0]);
          totW += RW2 * (pWt[x1 + 1] - pWt[x0]);
        }
      }

      const oi = mi * 4;
      dst[oi]     = Math.min(255, Math.round(totR / totW));
      dst[oi + 1] = Math.min(255, Math.round(totG / totW));
      dst[oi + 2] = Math.min(255, Math.round(totB / totW));
      dst[oi + 3] = Math.round(totA / totW);
    }
  }
  return dst;
}

// ════════════════════════════════════════════════════════════════════
// BOKEH BLUR WORKER POOL — keeps the UI thread responsive AND uses all cores
// ════════════════════════════════════════════════════════════════════
// bokehBlurCore is expensive at large radii (inherent to the algorithm: cost
// scales with radius). Running it on the main thread freezes everything —
// status text, hover states, even the spinner — for the full duration.
//
// Beyond just moving the work off the main thread, the blur is also split
// across a small POOL of Workers (one per CPU core, capped) so multiple
// cores crunch it simultaneously. This is safe because of how the blur
// works: output row y only ever reads source rows [y - r, y + r] (the
// "kRows" window in bokehBlurCore) — it never reads anything outside that
// band. So the image can be cut into horizontal bands, each band's worker
// given its slice PLUS r rows of overlap context above/below, and the
// results stitched back together — completely equivalent to running the
// whole image through bokehBlurCore in one pass, just spread over multiple
// cores. The worker source is still built from bokehBlurCore's own
// toString(), so every worker runs byte-for-byte the same pixel math the
// main thread would otherwise run inline. Same code, same inputs (per band),
// same outputs once stitched — only *where* and *how many at once* changes.
const BOKEH_POOL_SIZE = Math.max(1, Math.min(8, (navigator.hardwareConcurrency || 4)));
let _bokehPool = null;       // array of Worker
let _bokehPoolSeq = 0;
const _bokehPoolJobs = new Map(); // id -> { resolve, reject }

function getBokehPool() {
  if (_bokehPool) return _bokehPool;
  const workerSrc = `
    const BOKEH_RINGS = ${JSON.stringify(BOKEH_RINGS)};
    const bokehBlurCore = ${bokehBlurCore.toString()};
    self.onmessage = (e) => {
      const { id, w, h, data, mask, radius } = e.data;
      try {
        const result = bokehBlurCore(w, h, new Uint8ClampedArray(data), mask ? new Uint8Array(mask) : null, radius);
        self.postMessage({ id, ok: true, data: result.buffer }, [result.buffer]);
      } catch (err) {
        self.postMessage({ id, ok: false, error: String(err && err.message || err) });
      }
    };
  `;
  const blob = new Blob([workerSrc], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  _bokehPool = [];
  for (let i = 0; i < BOKEH_POOL_SIZE; i++) {
    const w = new Worker(url);
    w.onmessage = (e) => {
      const { id, ok, data, error } = e.data;
      const job = _bokehPoolJobs.get(id);
      if (!job) return;
      _bokehPoolJobs.delete(id);
      if (ok) job.resolve(new Uint8ClampedArray(data));
      else job.reject(new Error(error || 'Worker error'));
    };
    w.onerror = (e) => {
      // Fail every in-flight job assigned to THIS worker rather than hanging
      // forever if it throws outside the try/catch (e.g. a syntax problem).
      for (const [id, job] of _bokehPoolJobs) {
        if (job.worker === w) { _bokehPoolJobs.delete(id); job.reject(new Error(e.message || 'Worker error')); }
      }
    };
    _bokehPool.push(w);
  }
  return _bokehPool;
}

// Runs bokehBlurCore for one band on a specific worker, resolves with the
// resulting buffer. Buffers are transferred (not copied) both ways.
function runBokehBandOnWorker(worker, w, h, dataBuffer, maskBuffer, radius) {
  return new Promise((resolve, reject) => {
    const id = ++_bokehPoolSeq;
    _bokehPoolJobs.set(id, { resolve, reject, worker });
    const transfer = maskBuffer ? [dataBuffer, maskBuffer] : [dataBuffer];
    worker.postMessage({ id, w, h, data: dataBuffer, mask: maskBuffer, radius }, transfer);
  });
}

// Splits [0,h) into up to `bands` horizontal bands of roughly equal height
// (last band absorbs any remainder), skipping the split entirely for small
// images/radii where the overlap overhead wouldn't pay for itself.
function computeBokehBands(h, radius, poolSize) {
  const r = Math.max(1, Math.round(radius));
  // Below this, per-band overlap (2r extra rows each) starts costing more
  // than splitting saves; just run it as a single band on one worker.
  const minRowsPerBand = Math.max(8, r * 2);
  let bands = Math.min(poolSize, Math.max(1, Math.floor(h / minRowsPerBand)));
  if (bands <= 1) return [{ y0: 0, y1: h }];
  const bandH = Math.ceil(h / bands);
  const out = [];
  for (let y0 = 0; y0 < h; y0 += bandH) {
    out.push({ y0, y1: Math.min(h, y0 + bandH) });
  }
  return out;
}

// Runs bokehBlurCore over the whole image by splitting it into row-bands,
// running each band on its own pooled Worker in parallel, and stitching the
// results back together. Each band gets `radius` rows of overlap context
// above/below (clamped to image bounds) — exactly the window bokehBlurCore
// itself reads from for those rows — so each output row is computed from
// the same source pixels it would have been in a single, unsplit pass.
// Output is therefore identical to running the whole image through
// bokehBlurCore once; only the wall-clock time changes.
async function runBokehBlurAsync(w, h, imageData, mask, radius) {
  const pool = getBokehPool();
  const r = Math.max(1, Math.round(radius));
  const bands = computeBokehBands(h, radius, pool.length);
  const srcData = imageData.data; // Uint8ClampedArray view over the full image

  const dst = new Uint8ClampedArray(w * h * 4);
  const jobs = bands.map((band, i) => {
    const srcY0 = Math.max(0, band.y0 - r);
    const srcY1 = Math.min(h, band.y1 + r);
    const subH = srcY1 - srcY0;

    // Copy (not transfer) each band's slice out of the shared source — every
    // band needs to read overlapping rows, so the buffers can't be split by
    // ownership; each worker gets its own independent copy instead.
    const subData = srcData.slice(srcY0 * w * 4, srcY1 * w * 4);
    const subMask = mask ? mask.slice(srcY0 * w, srcY1 * w) : null;

    const worker = pool[i % pool.length];
    return runBokehBandOnWorker(worker, w, subH, subData.buffer, subMask ? subMask.buffer : null, radius)
      .then(resultBand => {
        const offsetInSub = band.y0 - srcY0;
        const rowsToCopy = band.y1 - band.y0;
        dst.set(
          resultBand.subarray(offsetInSub * w * 4, (offsetInSub + rowsToCopy) * w * 4),
          band.y0 * w * 4
        );
      });
  });

  await Promise.all(jobs);
  return dst;
}

// Async, worker-pool-backed replacement for the old synchronous
// bokehBlurSelection. Same effect on img (reads current pixels + mask,
// writes the blurred result back via putImageData, marks img dirty) —
// just non-blocking and spread across multiple cores. Callers must `await`
// this and not touch img's canvas until it resolves.
async function bokehBlurSelection(img, radius) {
  const { w, h, ctx, mask } = img;
  const src = ctx.getImageData(0, 0, w, h);
  // Mask is read-only here and still needed elsewhere (history, batch mode);
  // runBokehBlurAsync copies per-band slices internally, so the live mask is
  // never mutated or transferred away.
  const resultData = await runBokehBlurAsync(w, h, src, mask, radius);
  const dst = new ImageData(resultData, w, h);
  ctx.putImageData(dst, 0, 0);
  markDirty(img);
}


// ════════════════════════════════════════════════════════════════════
// HISTORY — per-image undo/redo, Paint.NET style
// ════════════════════════════════════════════════════════════════════
const MAX_HISTORY = 40;

// Pushes a new "notable action" snapshot onto img's history, discarding
// any redo tail beyond the current pointer (a fresh action after undoing
// overwrites the steps that were undone — same as Paint.NET).
//
// opts.pixelsChanged / opts.maskChanged (default true for both) tell this
// whether the action actually touched the canvas pixels / the selection
// mask. Selection actions (draw/select-all/deselect) don't touch pixels;
// filter applies don't touch the mask. When a given piece didn't change,
// we reuse the previous entry's reference instead of re-capturing a full
// snapshot — a full RGBA frame here is ~5.5MB at typical photo sizes, and
// re-reading it via getImageData on every single selection click was the
// single biggest driver of history memory bloat with many images open.
function pushHistory(img, label, opts) {
  const pixelsChanged = !opts || opts.pixelsChanged !== false;
  const maskChanged = !opts || opts.maskChanged !== false;
  const prev = img.history[img.historyIndex];
  const imageData = (pixelsChanged || !prev) ? img.ctx.getImageData(0, 0, img.w, img.h) : prev.imageData;
  const mask = (maskChanged || !prev) ? img.mask : prev.mask;
  const snapshot = {
    label,
    imageData,
    mask,
    sel: (state.images[state.activeIdx] === img && state.sel) ? structuredClone(state.sel) : null,
  };
  img.history = img.history.slice(0, img.historyIndex + 1);
  img.history.push(snapshot);
  if (img.history.length > MAX_HISTORY) {
    img.history.shift();
    if (img.savedAt >= 0) img.savedAt--;
  }
  img.historyIndex = img.history.length - 1;
  img.unsaved = img.historyIndex !== img.savedAt;
  if (state.images[state.activeIdx] === img) renderHistoryPanel();
}
function restoreHistoryState(img, idx) {
  const st = img.history[idx];
  img.ctx.putImageData(st.imageData, 0, 0);
  img.mask = st.mask || null;
  markDirty(img);
  if (state.images[state.activeIdx] === img) {
    state.sel = st.sel ? structuredClone(st.sel) : null;
    updateSelDisplay();
    renderSelMaskOverlay();
  }
}
function undo() {
  const img = state.images[state.activeIdx];
  if (!img || img.historyIndex <= 0) { setStatus('Nothing to undo', false); return; }
  const undoneLabel = img.history[img.historyIndex].label;
  img.historyIndex--;
  restoreHistoryState(img, img.historyIndex);
  img.unsaved = img.historyIndex !== img.savedAt;
  renderGallery(); updateStatusBar(); renderHistoryPanel();
  setStatus(`Undid: ${undoneLabel}`, true);
}
function redo() {
  const img = state.images[state.activeIdx];
  if (!img || img.historyIndex >= img.history.length - 1) { setStatus('Nothing to redo', false); return; }
  img.historyIndex++;
  restoreHistoryState(img, img.historyIndex);
  img.unsaved = img.historyIndex !== img.savedAt;
  renderGallery(); updateStatusBar(); renderHistoryPanel();
  setStatus(`Redid: ${img.history[img.historyIndex].label}`, true);
}
function jumpToHistory(idx) {
  const img = state.images[state.activeIdx];
  if (!img || idx === img.historyIndex || idx < 0 || idx >= img.history.length) return;
  img.historyIndex = idx;
  restoreHistoryState(img, idx);
  img.unsaved = img.historyIndex !== img.savedAt;
  renderGallery(); updateStatusBar(); renderHistoryPanel();
  setStatus(`Jumped to: ${img.history[idx].label}`, true);
}
function toggleHistoryPanel() {
  // History lives docked above the gallery (Paint.NET-style), so "toggling"
  // it just collapses/expands that dock rather than opening a float-over panel.
  state.historyCollapsed = !state.historyCollapsed;
  $('history-dock').classList.toggle('collapsed', state.historyCollapsed);
  $('history-collapse-btn').textContent = state.historyCollapsed ? '▸' : '▾';
  $('tool-history').classList.toggle('active', !state.historyCollapsed);
  if (state.galleryState === 'hidden') setGalleryState('side');
  if (!state.historyCollapsed) renderHistoryPanel();
}
function renderHistoryPanel() {
  const img = state.images[state.activeIdx];
  const undoBtn = $('undo-btn'), redoBtn = $('redo-btn'), list = $('history-list');
  if (!img) {
    undoBtn.disabled = true; redoBtn.disabled = true;
    list.innerHTML = '<div class="history-empty">no image open</div>';
    return;
  }
  undoBtn.disabled = img.historyIndex <= 0;
  redoBtn.disabled = img.historyIndex >= img.history.length - 1;
  list.innerHTML = '';
  img.history.forEach((st, i) => {
    const row = document.createElement('div');
    row.className = 'history-item' + (i === img.historyIndex ? ' current' : (i > img.historyIndex ? ' future' : ''));
    row.textContent = st.label;
    row.onclick = () => jumpToHistory(i);
    list.appendChild(row);
  });
}

// ════════════════════════════════════════════════════════════════════
// FILTER PANELS — pixelate / blur, with presets + assignable hotkeys
// ════════════════════════════════════════════════════════════════════
function loadPresets() {
  let raw = null;
  try {
    // One-time migration: this app used to be branded "vanta." and stored

  if (match) { e.preventDefault(); runFilter(match.type, match.value); return; }

  if (e.key === 'Escape') {
    closeMetaPanelDirect();
    closeContextMenu();
    document.querySelectorAll('.filter-panel.open').forEach(p => p.classList.remove('open'));
    $('tool-pixelate').classList.remove('active');
    $('tool-blur').classList.remove('active');
    const img = state.images[state.activeIdx];
    const hadSelection = img && maskHasSelection(img.mask);
    clearSelection();
    if (hadSelection) { pushHistory(img, 'Deselect', { pixelsChanged: false }); renderGallery(); updateStatusBar(); }
    if (state.multiSelected.size) { state.multiSelected.clear(); renderGallery(); }
  } else if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
    e.preventDefault(); saveImage();
  } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && e.shiftKey) {
    e.preventDefault(); redo();
  } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault(); undo();
  } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
    e.preventDefault(); redo();
  } else if ((e.ctrlKey || e.metaKey) && (e.key === 'a' || e.key === 'A')) {
    e.preventDefault();
    if (state.currentTool !== 'select') setTool('select');
    selectAll();
  } else if (e.key === 's' || e.key === 'S') {
    pressS();
  } else if (e.key === 'r' || e.key === 'R') {
    pressR();
  } else if (e.key === 'h' || e.key === 'H') {
    toggleAllUI();
  } else if (e.key === 'c' || e.key === 'C') {
    // Fit-then-save in one press: same two actions as pressing F (fit to
    // window) followed by Ctrl+S (save), just chained under one key.
    e.preventDefault();
    fitImage();
    saveImage();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (state.activeIdx > 0) { selectImage(state.activeIdx - 1); setStatus(`Showing ${state.images[state.activeIdx].name}`, true); }
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (state.activeIdx < state.images.length - 1) { selectImage(state.activeIdx + 1); setStatus(`Showing ${state.images[state.activeIdx].name}`, true); }
  } else if (e.key === '+' || e.key === '=') {
    zoomBy(0.25);
  } else if (e.key === '-') {
    zoomBy(-0.25);
  } else if (e.key === '1') {
    zoomTo(1);
  } else if (e.key === '0' || e.key === 'f' || e.key === 'F') {
    fitImage();
  }
});

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const menu = $('context-menu');
  if (menu.classList.contains('open') && !menu.contains(e.target)) closeContextMenu();
});

// Tooltips near the edge of the window (the "Open folder…" button sits
// right against the left edge, the history toggle against the right edge,
// etc.) can compute a position that pushes part of their text past the
// window bounds. Since the app window itself doesn't scroll, that's not
// "off-screen" — it's just invisible, clipped by the window edge. Nudge
// the tooltip back inward with a margin offset (applied via margin so it
// stacks cleanly with each tooltip's own centering/alignment transform)
// right before it becomes visible.
function fitTooltipToViewport(wrapperEl) {
  const tip = wrapperEl.querySelector('.tool-tooltip');
  if (!tip) return;
  tip.style.marginLeft = '';
  tip.style.marginTop = '';
  const margin = 6;
  const rect = tip.getBoundingClientRect();
  let dx = 0, dy = 0;
  if (rect.left < margin) dx = margin - rect.left;
  else if (rect.right > window.innerWidth - margin) dx = (window.innerWidth - margin) - rect.right;
  if (rect.top < margin) dy = margin - rect.top;
  else if (rect.bottom > window.innerHeight - margin) dy = (window.innerHeight - margin) - rect.bottom;
  if (dx) tip.style.marginLeft = dx + 'px';
  if (dy) tip.style.marginTop = dy + 'px';
}
document.querySelectorAll('.tool-btn, .qa-btn, .history-toggle-btn').forEach(el => {
  el.addEventListener('mouseenter', () => fitTooltipToViewport(el));
});

loadPresets();
setGalleryState(state.galleryState);
setTool(state.currentTool);
updateSelectIcon();
$('tool-history').classList.toggle('active', !state.historyCollapsed);
setAutoAdvance(state.autoAdvance);
renderGallery();
updateStatusBar();
renderHistoryPanel();
setStatus('Ready', true);
</script>
