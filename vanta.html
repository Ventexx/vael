<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VANTA</title>
<link rel="icon" type="image/png" href="./icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════
   RESET
══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ══════════════════════════════════════════════════
   THEME TOKENS
══════════════════════════════════════════════════ */
body.theme-focus {
  --bg:           #0a0a0a;
  --bg2:          #0f0f0f;
  --bg3:          #141414;
  --surface:      #161616;
  --border:       #1e1e1e;
  --border2:      #252525;
  --group-line:   rgba(255,255,255,0.05);
  --accent:       #00c9b1;
  --accent-dim:   #009e8c;
  --accent-faint: rgba(0,201,177,0.06);
  --text:         #d4d4d4;
  --text-mid:     #666666;
  --text-dim:     #3a3a3a;
  --done-text:    #3d3d3d;
  --done-strike:  #2e2e2e;
  --red:          #c75f6a;
  --red-bg:       rgba(199,95,106,0.08);
  --chrome:       rgba(10,10,10,0.97);
  --chrome-border:rgba(255,255,255,0.05);
  --radius:       5px;
  --radius-lg:    7px;
  --font-ui:      'DM Mono', monospace;
  --font-mono:    'DM Mono', monospace;
  background: var(--bg); color: var(--text);
  font-family: var(--font-ui); font-size: 13.5px; cursor: default;
}

body.theme-minimal {
  --bg:           #1f1f1f;
  --bg2:          #252525;
  --bg3:          #2c2c2c;
  --surface:      #333333;
  --border:       #444444;
  --border2:      #555555;
  --group-line:   rgba(255,255,255,0.08);
  --accent:       #ffffff;
  --accent-dim:   #cccccc;
  --accent-faint: rgba(255,255,255,0.05);
  --text:         #eeeeee;
  --text-mid:     #aaaaaa;
  --text-dim:     #666666;
  --done-text:    #555555;
  --done-strike:  #444444;
  --red:          #ff6b6b;
  --red-bg:       rgba(255,107,107,0.1);
  --chrome:       rgba(31,31,31,0.96);
  --chrome-border:rgba(255,255,255,0.06);
  --radius:       4px;
  --radius-lg:    6px;
  --font-ui:      'DM Mono', monospace;
  --font-mono:    'DM Mono', monospace;
  background: var(--bg); color: var(--text);
  font-family: var(--font-ui); font-size: 14px; cursor: default;
}

body.theme-paper {
  --bg:           #f6f1e8;
  --bg2:          #f0ebe2;
  --bg3:          #ebe4d9;
  --surface:      #fffaf1;
  --border:       #d7cfc1;
  --border2:      #c9c0b2;
  --group-line:   rgba(63,95,122,0.14);
  --accent:       #3f5f7a;
  --accent-dim:   #5b7284;
  --accent-faint: rgba(63,95,122,0.08);
  --text:         #202428;
  --text-mid:     #64707b;
  --text-dim:     #8e8a80;
  --done-text:    #8b8174;
  --done-strike:  #b9b0a3;
  --red:          #b94b4b;
  --red-bg:       rgba(185,75,75,0.10);
  --chrome:       rgba(247,242,234,0.96);
  --chrome-border:rgba(0,0,0,0.08);
  --radius:       8px;
  --radius-lg:    14px;
  --font-ui:      'Syne', sans-serif;
  --font-mono:    'DM Mono', monospace;
  background: var(--bg); color: var(--text);
  font-family: var(--font-ui); font-size: 15px; cursor: default;
}

body.theme-focus .glow-bg { display: none; }
body.theme-minimal .glow-bg { display: none; }
body.theme-paper .glow-bg { background: radial-gradient(ellipse, rgba(63,95,122,0.08) 0%, transparent 72%); top: -20vh; }

/* ══════════════════════════════════════════════════
   OVERLAYS
══════════════════════════════════════════════════ */
.noise-overlay {
  position: fixed; inset: 0; z-index: 9997; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.025;
}
body.theme-paper .noise-overlay { opacity: 0.018; }
body.theme-focus .noise-overlay { opacity: 0; }
.glow-bg {
  position: fixed; top: -25vh; left: 50%;
  transform: translateX(-50%);
  width: 80vw; height: 60vh;
  pointer-events: none; z-index: 0;
}

/* ══════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════ */
#app {
  position: relative; z-index: 1; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 24px 80px;
}

header { width: 100%; display: flex; align-items: center; padding: 44px 0 36px; max-width: 680px; }
.logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); font-family: var(--font-ui); line-height: 1; text-transform: lowercase; }
.logo-dot { color: var(--accent); }
.header-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; margin-left: 8px; margin-top: 1px; }

/* ══════════════════════════════════════════════════
   TOOLBAR
══════════════════════════════════════════════════ */
.toolbar { margin-left: auto; display: flex; gap: 4px; align-items: center; }
.tb-btn {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative; width: 30px; height: 30px; border-radius: var(--radius); cursor: pointer;
}
.tb-btn:hover { color: var(--accent); border-color: var(--border2); background: var(--accent-faint); }
.tb-btn:disabled { opacity: 0.2 !important; pointer-events: none; }

/* ══════════════════════════════════════════════════
   INPUT WRAP
══════════════════════════════════════════════════ */
.input-wrap { width: 100%; z-index: 10; position: sticky; top: 16px; max-width: 680px; margin-bottom: 28px; }
.input-bar {
  display: flex; align-items: stretch; position: relative;
  background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: 0 1px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.02);
  transition: box-shadow 0.25s, border-color 0.25s;
}
body.theme-focus .input-bar:focus-within { border-color: rgba(0,201,177,0.25); box-shadow: none; }
body.theme-minimal .input-bar:focus-within { border-color: var(--accent); }
body.theme-paper .input-bar:focus-within { border-color: rgba(63,95,122,0.35); box-shadow: 0 4px 28px rgba(0,0,0,0.12), 0 0 18px rgba(63,95,122,0.06); }

#task-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); letter-spacing: 0.3px; font-size: 15px; padding: 15px 18px; font-family: var(--font-ui); }
#task-input::placeholder { color: var(--text-dim); }

.bar-btn { background: none; border: none; display: flex; align-items: center; gap: 5px; font-family: var(--font-mono); transition: color 0.15s, background 0.15s; white-space: nowrap; color: var(--text-dim); padding: 10px 14px; font-size: 14px; cursor: pointer; }
.bar-btn:hover { color: var(--accent); background: var(--accent-faint); }

.bar-btn.add-btn {
  padding: 9px 18px; margin: 6px 6px 6px 0; border-radius: var(--radius);
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--accent); font-size: 13px; font-weight: 600; font-family: var(--font-ui); cursor: pointer;
}
body.theme-focus .bar-btn.add-btn { background: transparent; border: 1px solid var(--border2); }
body.theme-paper .bar-btn.add-btn { background: rgba(63,95,122,0.08); border: 1px solid rgba(63,95,122,0.18); color: var(--accent); }
.bar-btn.add-btn:hover { background: var(--accent-faint); border-color: var(--accent); }

.bar-divider { width: 1px; background: var(--border); flex-shrink: 0; }
.bar-btn.spacer-btn { border-left: 1px solid var(--border); }

/* ══════════════════════════════════════════════════
   TASK LIST & ITEMS
══════════════════════════════════════════════════ */
#task-list { display: flex; flex-direction: column; width: 100%; max-width: 680px; }

.task-item, .spacer-item {
  position: relative; display: flex; align-items: center; user-select: none; transition: background 0.14s, border-color 0.14s; cursor: default;
  width: 100%;
}

.task-item {
  padding: 11px 12px 11px 10px; gap: 12px; border-radius: var(--radius); border: 1px solid transparent;
}
.task-item:hover { background: var(--bg3); border-color: var(--border); }

.task-item.drag-over-top { border-top: 2px solid var(--accent) !important; }
.task-item.drag-over-bot { border-bottom: 2px solid var(--accent) !important; }
.task-item.dragging { opacity: 0.25; }

.drag-handle { opacity: 0; color: var(--text-dim); display: flex; align-items: center; transition: opacity 0.12s; flex-shrink: 0; padding: 2px; cursor: grab; }
.task-item:hover .drag-handle, .spacer-item:hover .drag-handle { opacity: 1; }

.cb-wrap { position: relative; flex-shrink: 0; }
.cb-wrap input { display: none; }
.cb-box { display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: transparent; width: 18px; height: 18px; border: 1.5px solid var(--border2); border-radius: 5px; cursor: pointer; }
.cb-wrap:hover .cb-box { border-color: var(--accent); background: var(--accent-faint); }
.cb-wrap input:checked ~ .cb-box { background: var(--accent-faint); border-color: var(--accent); }

.cb-box svg { display: none; }
.cb-wrap input:checked ~ .cb-box svg { display: block; }

.task-text { flex: 1; word-break: break-word; outline: none; transition: color 0.15s; font-family: var(--font-ui); font-size: 14.5px; font-weight: 400; color: var(--text); }
.task-item.done .task-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--done-strike); }

.task-text[contenteditable=true] {
  color: var(--text) !important; text-decoration: none !important; outline: none;
  background: rgba(0,0,0,0.08); box-shadow: 0 0 0 1px var(--border2); padding: 1px 5px; margin: -1px -5px; user-select: text;
}

.del-btn {
  opacity: 0; background: none; border: none; color: var(--text-dim); display: flex; align-items: center; justify-content: center;
  transition: opacity 0.12s, color 0.12s, background 0.12s; flex-shrink: 0; cursor: pointer; width: 24px; height: 24px; border-radius: 6px;
}
.task-item:hover .del-btn { opacity: 1; }
.del-btn:hover { color: var(--red) !important; background: var(--red-bg) !important; }

/* ══════════════════════════════════════════════════
   SPACER
══════════════════════════════════════════════════ */
.spacer-item {
  min-height: 22px;
  padding: 6px 12px 6px 10px;
  gap: 12px;
  border-radius: var(--radius);
  border: 1px solid transparent;
}
.spacer-item:hover { background: var(--bg3); border-color: var(--border); }

.spacer-item.drag-over-top { border-top: 2px solid var(--accent) !important; }
.spacer-item.drag-over-bot { border-bottom: 2px solid var(--accent) !important; }
.spacer-item.dragging { opacity: 0.25; }

.spacer-line {
  flex: 1;
  height: 2px;
  min-width: 12px;
  border-radius: 999px;
  background: var(--border2);
  opacity: 0.95;
}

.spacer-del {
  opacity: 0; background: none; border: none; color: var(--text-dim); display: flex; align-items: center; justify-content: center;
  transition: opacity 0.12s, color 0.12s; flex-shrink: 0; cursor: pointer; width: 24px; height: 24px; border-radius: 6px;
}
.spacer-item:hover .spacer-del { opacity: 1; }
.spacer-del:hover { color: var(--red) !important; }

/* ══════════════════════════════════════════════════
   EMPTY STATE & FOOTER ELEMENTS
══════════════════════════════════════════════════ */
.empty-state { opacity: 0; animation: fadeIn 0.4s 0.2s forwards; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 32px 0 0; }
.empty-icon { width: 48px; height: 48px; border: 1.5px solid var(--border2); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); background: var(--surface); }
.empty-label { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; }

@keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
.task-item.new, .spacer-item.new { animation: slideIn 0.2s cubic-bezier(0.22,1,0.36,1); }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

#counter { position: fixed; bottom: 56px; right: 28px; pointer-events: none; z-index: 20; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.8px; }
#counter b { color: var(--accent); font-weight: 400; }

#theme-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  height: 34px;
  border-top: 1px solid var(--chrome-border);
  background: var(--chrome);
}
.theme-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-right: 14px; padding-left: 12px; font-family: var(--font-mono); }

.theme-btn {
  background: none; border: none; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  padding: 0 14px; height: 100%; color: var(--text-dim); border-right: 1px solid var(--chrome-border); transition: color 0.15s, background 0.15s; position: relative; cursor: pointer;
}
.theme-btn:last-child { border-right: none; }
.theme-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
body.theme-paper .theme-btn:hover { background: rgba(0,0,0,0.03); }
.theme-btn.active { color: var(--accent); background: var(--accent-faint); }
.theme-btn.active::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--accent); opacity: 0.6; }

#help-btn {
  position: fixed; bottom: 0; right: 0; z-index: 10000;
  width: 34px; height: 34px;
  background: none; border: none; border-left: 1px solid var(--chrome-border);
  color: var(--text-dim); font-family: var(--font-mono); font-size: 11px;
  cursor: default; display: flex; align-items: center; justify-content: center;
}
#help-tooltip {
  position: fixed; bottom: 42px; right: 8px; z-index: 10001;
  background: var(--bg2); border: 1px solid var(--border2);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-mid);
  padding: 12px 16px; line-height: 2;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
  white-space: nowrap;
}
#help-btn:hover + #help-tooltip, #help-tooltip:hover { opacity: 1; }
#help-tooltip .sk-key { color: var(--text-dim); }
#help-tooltip .sk-desc { color: var(--text-mid); margin-left: 8px; }

#save-toast { position: fixed; bottom: 46px; right: 28px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* ══════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════ */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 34px; z-index: 9998;
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--chrome-border);
  transform: translateX(-100%);
  transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: none;
  display: flex; flex-direction: column;
}
#sidebar.open {
  transform: translateX(0);
  pointer-events: all;
}

/* sidebar header */
.sb-header {
  display: flex; align-items: center; justify-content: center;
  padding: 20px 14px 12px;
  border-bottom: 1px solid var(--chrome-border);
  flex-shrink: 0;
  position: relative;
}
.sb-title {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-dim);
}
.sb-new-btn {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  width: 30px; height: 30px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
  flex-shrink: 0;
  position: absolute; right: 14px;
}
.sb-new-btn:hover { color: var(--accent); border-color: var(--border2); background: var(--accent-faint); }

/* profile list */
.sb-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.sb-empty {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  padding: 20px 16px; text-align: center; line-height: 1.7;
}
.profile-item {
  display: flex; align-items: center;
  padding: 0 8px 0 14px; height: 36px;
  cursor: default;
  position: relative; transition: background 0.12s;
}
.profile-item:hover { background: var(--bg3); }
.profile-item.active { background: var(--accent-faint); }
.profile-item.active .profile-name { color: var(--accent); }

.profile-name {
  flex: 1; font-family: var(--font-mono); font-size: 12px; color: var(--text-mid);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  outline: none; min-width: 0;
}
.profile-name[contenteditable=true] {
  color: var(--text) !important; background: rgba(0,0,0,0.15);
  box-shadow: 0 0 0 1px var(--border2); padding: 1px 4px; margin: -1px -4px;
  border-radius: 3px; user-select: text; overflow: visible; text-overflow: unset;
}
.profile-del {
  opacity: 0; background: none; border: none; color: var(--text-dim);
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px; cursor: pointer; flex-shrink: 0; transition: opacity 0.12s, color 0.12s;
}
.profile-item:hover .profile-del { opacity: 1; }
.profile-del:hover { color: var(--red); }
.profile-load {
  opacity: 0; background: none; border: none; color: var(--text-dim);
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px; cursor: pointer; flex-shrink: 0; transition: opacity 0.12s, color 0.12s;
}
.profile-item:hover .profile-load { opacity: 1; }
.profile-load:hover { color: var(--accent); }

/* sidebar footer */
.sb-footer {
  flex-shrink: 0; border-top: 1px solid var(--chrome-border);
  padding: 10px;
  display: flex; gap: 6px;
}
.sb-foot-btn {
  flex: 1; background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase; height: 28px;
  border-radius: var(--radius); cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.sb-foot-btn:hover { color: var(--accent); border-color: var(--border2); background: var(--accent-faint); }

/* ══════════════════════════════════════════════════
   CONFIRM MODAL
══════════════════════════════════════════════════ */
#modal-backdrop {
  position: fixed; inset: 0; z-index: 19999;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
#modal-backdrop.open { opacity: 1; pointer-events: all; }
#modal {
  background: var(--bg2); border: 1px solid var(--border2);
  width: 300px; padding: 24px 22px 20px;
  font-family: var(--font-mono);
  transform: translateY(6px); transition: transform 0.15s;
}
#modal-backdrop.open #modal { transform: translateY(0); }
#modal-msg {
  font-size: 12px; color: var(--text-mid); line-height: 1.75; margin-bottom: 20px;
}
#modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  background: none; border: 1px solid var(--border2); color: var(--text-dim);
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 6px 14px; cursor: pointer;
  border-radius: var(--radius); transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.modal-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
.modal-btn.primary { color: var(--accent); border-color: rgba(0,201,177,0.3); }
.modal-btn.primary:hover { background: var(--accent-faint); border-color: var(--accent); }

#menu-btn {
  position: fixed; top: 12px; left: 14px; z-index: 9999;
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); width: 30px; height: 30px;
  border-radius: var(--radius); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
}
#menu-btn:hover { color: var(--accent); border-color: var(--border2); background: var(--accent-faint); }
#menu-btn span {
  display: block; width: 10px; height: 1.5px;
  background: currentColor; border-radius: 2px;
  transition: background 0.15s;
}

</style>
</head>
<body class="theme-focus">

<div class="noise-overlay"></div>
<div class="glow-bg"></div>

<button id="menu-btn" title="Menu" aria-label="Toggle sidebar">
  <span></span><span></span><span></span>
</button>

<div id="sidebar">
  <div class="sb-header">
    <span class="sb-title">profiles</span>
    <button class="sb-new-btn" id="sb-new-btn" title="Save current list as new profile">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>
    </button>
  </div>
  <div class="sb-list" id="sb-list"></div>
  <div class="sb-footer">
    <button class="sb-foot-btn" id="sb-import-btn">import</button>
    <button class="sb-foot-btn" id="sb-export-btn">export</button>
  </div>
</div>

<div id="modal-backdrop">
  <div id="modal">
    <div id="modal-msg"></div>
    <div id="modal-actions">
      <button class="modal-btn" id="modal-no">No</button>
      <button class="modal-btn primary" id="modal-yes">Yes</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">vanta<span class="logo-dot">.</span></div>
    <div class="header-meta" id="header-meta">// today</div>
    <div class="toolbar">
      <button class="tb-btn" id="clean-btn" title="Remove completed tasks" disabled>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="tb-btn" id="undo-btn" title="Undo (Ctrl+Z)" disabled>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7v6h6"/><path d="M3 13c1.5-4.5 6-8 11-8 4.8 0 9 3.6 9 9s-4.2 9-9 9c-3 0-5.7-1.4-7.5-3.5"/></svg>
      </button>
      <button class="tb-btn" id="redo-btn" title="Redo (Ctrl+Y)" disabled>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 7v6h-6"/><path d="M21 13c-1.5-4.5-6-8-11-8C5.2 5 1 8.6 1 14s4.2 9 9 9c3 0 5.7-1.4 7.5-3.5"/></svg>
      </button>
    </div>
  </header>

  <div class="input-wrap">
    <div class="input-bar">
      <input id="task-input" type="text" placeholder="enter task…" autocomplete="off" spellcheck="false"/>
      <button class="bar-btn add-btn" id="add-btn">add</button>
      <button class="bar-btn spacer-btn" id="spacer-btn">sep</button>

  <div id="task-list"></div>
</div>

<div id="counter"></div>
<div id="save-toast">saved</div>

<div id="theme-bar">
  <span class="theme-label">theme</span>
  <button class="theme-btn active" data-theme="focus">focus</button>
  <button class="theme-btn" data-theme="minimal">minimal</button>
  <button class="theme-btn" data-theme="paper">paper</button>
</div>

<button id="help-btn">?</button>
<div id="help-tooltip">
  <div><span class="sk-key">enter</span><span class="sk-desc">add task</span></div>
  <div><span class="sk-key">double-click</span><span class="sk-desc">edit task / rename profile</span></div>
  <div><span class="sk-key">esc</span><span class="sk-desc">cancel edit</span></div>
  <div><span class="sk-key">/</span><span class="sk-desc">focus task input</span></div>
  <div><span class="sk-key">ctrl+m</span><span class="sk-desc">toggle menu</span></div>
  <div><span class="sk-key">ctrl+z</span><span class="sk-desc">undo</span></div>
  <div><span class="sk-key">ctrl+y</span><span class="sk-desc">redo</span></div>
  <div><span class="sk-key">ctrl+enter</span><span class="sk-desc">add separator</span></div>
  <div><span class="sk-key">ctrl+s</span><span class="sk-desc">save to profile</span></div>
  <div><span class="sk-key">drag handle</span><span class="sk-desc">reorder</span></div>
</div>

<script>
const ALL_THEMES = ['focus', 'minimal', 'paper'];
let settingsFileHandle = null;

async function loadSettings() {
  try {
    const res = await fetch('./vanta.settings.json?_=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      if (data.theme && ALL_THEMES.includes(data.theme)) return data;
    }
  } catch(e) {}
  return { theme: 'focus' };
}

async function saveSettings(settings) {
  try {
    if (window.showSaveFilePicker) {
      if (!settingsFileHandle) {
        try {
          settingsFileHandle = await window.showSaveFilePicker({
            suggestedName: 'vanta.settings.json',
            types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
          });
        } catch(e) {}
      }
      if (settingsFileHandle) {
        const writable = await settingsFileHandle.createWritable();
        await writable.write(JSON.stringify(settings, null, 2));
        await writable.close();
        flashToast();
        return;
      }
    }
  } catch(e) {}
  try { localStorage.setItem('vanta_settings', JSON.stringify(settings)); flashToast(); } catch(e) {}
}

function loadSettingsSync() {
  try {
    const raw = localStorage.getItem('vanta_settings');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.theme && ALL_THEMES.includes(d.theme)) return d;
    }
  } catch(e) {}
  return null;
}

function flashToast() {
  const t = document.getElementById('save-toast');
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 1200);
}

function applyTheme(t, save = true) {
  document.body.className = 'theme-' + t;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
  render();
  if (save) saveSettings({ theme: t });
}

document.querySelectorAll('.theme-btn').forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.theme)));

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let items = [];
let undoStack = [];
let redoStack = [];
let idCounter = 0;
let dragSrc = null;

const list    = document.getElementById('task-list');
const input   = document.getElementById('task-input');
const counter = document.getElementById('counter');
const undoBtn = document.getElementById('undo-btn');
const redoBtn = document.getElementById('redo-btn');
const cleanBtn = document.getElementById('clean-btn');

function cloneItems() { return JSON.parse(JSON.stringify(items)); }
function pushHistory(b) { undoStack.push(b); redoStack = []; isDirty = true; updateTB(); }
function updateTB() {
  undoBtn.disabled = !undoStack.length;
  redoBtn.disabled = !redoStack.length;
  cleanBtn.disabled = !items.some(n => n.type === 'task' && n.done);
}
function undo() { if (!undoStack.length) return; redoStack.push(cloneItems()); items = undoStack.pop(); render(); updateTB(); }
function redo() { if (!redoStack.length) return; undoStack.push(cloneItems()); items = redoStack.pop(); render(); updateTB(); }

const DRAG_SVG  = `<svg width="8" height="14" viewBox="0 0 8 14" fill="currentColor"><circle cx="2" cy="2" r="1.2"/><circle cx="6" cy="2" r="1.2"/><circle cx="2" cy="7" r="1.2"/><circle cx="6" cy="7" r="1.2"/><circle cx="2" cy="12" r="1.2"/><circle cx="6" cy="12" r="1.2"/></svg>`;
const X_SVG     = `<svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="1" y1="1" x2="7" y2="7"/><line x1="7" y1="1" x2="1" y2="7"/></svg>`;
const CHECK_SVG = `<svg width="9" height="7" viewBox="0 0 9 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,3.5 3.5,6 8,1"/></svg>`;

// ════════════════════════════════════
// DATA HELPERS
// ════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function countTasks(arr = items) {
  let total = 0, done = 0;
  arr.forEach(node => {
    if (node.type === 'task') { total++; if (node.done) done++; }
  });
  return { total, done };
}

function updateCounter() {
  const stats = countTasks(items);
  counter.innerHTML = stats.total ? `<b>${stats.done}</b> / ${stats.total}` : '';
}

function getLocation(id) {
  for (let i = 0; i < items.length; i++) {
    if (items[i].id === id) return { container: items, index: i, node: items[i] };
  }
  return null;
}

function removeAtLocation(loc) {
  return loc.container.splice(loc.index, 1)[0];
}

function insertAt(container, index, node) {
  container.splice(index, 0, node);
}

function afterRemovalIndex(container, beforeIndex, sourceLoc) {
  if (sourceLoc.container === container && sourceLoc.index < beforeIndex) return beforeIndex - 1;
  return beforeIndex;
}

// ════════════════════════════════════
// RENDER
// ════════════════════════════════════
function render(newId = null) {
  list.innerHTML = '';
  if (!items.length) {
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.innerHTML = `
      <div class="empty-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      <div class="empty-label">nothing yet — start typing</div>`;
    list.appendChild(e);
  } else {
    items.forEach(node => renderNode(node, list));
  }
  updateCounter();
  updateTB();
}

function renderNode(node, parentEl) {
  if (node.type === 'spacer') {
    const el = mkSpacer(node);
    parentEl.appendChild(el);
    return;
  }
  const el = mkTask(node);
  parentEl.appendChild(el);
}

function mkTask(item) {
  const el = document.createElement('div');
  el.className = 'task-item' + (item.done ? ' done' : '');
  el.dataset.id = item.id;
  el.draggable = false;
  el.innerHTML = `
    <div class="drag-handle">${DRAG_SVG}</div>
    <label class="cb-wrap">
      <input type="checkbox" ${item.done ? 'checked' : ''}>
      <div class="cb-box">${CHECK_SVG}</div>
    </label>
    <div class="task-text" tabindex="-1">${esc(item.text)}</div>
    <button class="del-btn">${X_SVG}</button>`;

  el.querySelector('input[type=checkbox]').addEventListener('change', e => {
    const b = cloneItems();
    item.done = e.target.checked;
    pushHistory(b);
    render();
  });

  el.querySelector('.del-btn').addEventListener('click', () => del(item.id));

  const txt = el.querySelector('.task-text');
  el.addEventListener('dblclick', e => {
    if (e.target.closest('.cb-wrap,.del-btn,.drag-handle')) return;
    editTask(item, txt);
  });

  setupDrag(el, item);
  return el;
}

function mkSpacer(item) {
  const el = document.createElement('div');
  el.className = 'spacer-item';
  el.dataset.id = item.id;
  el.innerHTML = `
    <div class="drag-handle">${DRAG_SVG}</div>
    <div class="spacer-line"></div>
    <button class="spacer-del">${X_SVG}</button>`;
  el.querySelector('.spacer-del').addEventListener('click', () => del(item.id));
  setupDrag(el, item);
  return el;
}

function editTask(item, el) {
  el.contentEditable = 'true';
  el.focus();
  const r = document.createRange();
  r.selectNodeContents(el);
  r.collapse(false);
  const s = window.getSelection();
  s.removeAllRanges();
  s.addRange(r);

  const b = cloneItems();
  let saved = false;

  function save() {
    if (saved) return;
    saved = true;
    el.contentEditable = 'false';
    const t = el.textContent.trim();
    if (t && t !== item.text) {
      item.text = t;
      pushHistory(b);
    } else {
      el.textContent = item.text;
    }
    render();
  }

  el.addEventListener('blur', save, { once: true });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') { el.textContent = item.text; el.blur(); }
  });
}

function setupDrag(el, item) {
  const h = el.querySelector('.drag-handle');
  h.addEventListener('mousedown', () => { el.draggable = true; });

  el.addEventListener('dragstart', e => {
    dragSrc = item.id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => el.classList.add('dragging'), 0);
  });

  el.addEventListener('dragend', () => {
    el.draggable = false;
    el.classList.remove('dragging');
    document.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(x => x.classList.remove('drag-over-top', 'drag-over-bot'));
    dragSrc = null;
  });

  el.addEventListener('dragover', e => {
    e.preventDefault();
    if (!dragSrc || dragSrc === item.id) return;
    const mid = el.getBoundingClientRect().top + el.offsetHeight / 2;
    el.classList.toggle('drag-over-top', e.clientY < mid);
    el.classList.toggle('drag-over-bot', e.clientY >= mid);
  });

  el.addEventListener('dragleave', () => el.classList.remove('drag-over-top', 'drag-over-bot'));

  el.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    if (!dragSrc || dragSrc === item.id) return;

    const sourceLoc = getLocation(dragSrc);
    const targetLoc = getLocation(item.id);
    if (!sourceLoc || !targetLoc) return;

    const dropAfter = e.clientY >= (el.getBoundingClientRect().top + el.offsetHeight / 2);
    const srcIdx = sourceLoc.index;
    let tgtIdx = dropAfter ? targetLoc.index + 1 : targetLoc.index;

    // Adjust for the gap left by removing the source
    if (srcIdx < tgtIdx) tgtIdx--;

    if (srcIdx === tgtIdx) return;

    const b = cloneItems();
    const [moved] = items.splice(srcIdx, 1);
    items.splice(tgtIdx, 0, moved);
    pushHistory(b);
    render();
  });
}

// ════════════════════════════════════
// ACTIONS
// ════════════════════════════════════
function addTask() {
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const b = cloneItems();
  const it = { id: ++idCounter, type: 'task', text, done: false };
  items.push(it);
  pushHistory(b);
  render(it.id);
  input.value = '';
  input.focus();
}

function addSpacer() {
  const b = cloneItems();
  const it = { id: ++idCounter, type: 'spacer' };
  items.push(it);
  pushHistory(b);
  render(it.id);
  input.focus();
}

function del(id) {
  const loc = getLocation(id);
  if (!loc) return;
  const b = cloneItems();
  removeAtLocation(loc);
  pushHistory(b);
  render();
}

function clearDone() {
  const doneIds = items.filter(n => n.type === 'task' && n.done).map(n => n.id);
  if (!doneIds.length) return;
  const b = cloneItems();

  // Fade out done elements, then remove from data and re-render
  const els = doneIds.map(id => list.querySelector(`[data-id="${id}"]`)).filter(Boolean);
  els.forEach(el => {
    el.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateX(6px)';
  });

  setTimeout(() => {
    items = items.filter(n => !(n.type === 'task' && n.done));
    pushHistory(b);
    render();
  }, 230);
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) addTask();
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addSpacer();
});
document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('spacer-btn').addEventListener('click', addSpacer);
cleanBtn.addEventListener('click', clearDone);
undoBtn.addEventListener('click', undo);
redoBtn.addEventListener('click', redo);

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
});

list.addEventListener('dragover', e => e.preventDefault());
list.addEventListener('drop', e => {
  if (!dragSrc) return;
  const sourceLoc = getLocation(dragSrc);
  if (!sourceLoc || sourceLoc.node.type !== 'task') return;
  const b = cloneItems();
  const moved = removeAtLocation(sourceLoc);
  items.push(moved);
  pushHistory(b);
  render();
  dragSrc = null;
});

// ── SIDEBAR ──
const menuBtn = document.getElementById('menu-btn');
const sidebar = document.getElementById('sidebar');
menuBtn.addEventListener('click', () => {
  sidebar.classList.toggle('open');
});

// ── GLOBAL SHORTCUTS ──
document.addEventListener('keydown', e => {
  const active = document.activeElement;
  const isEditing = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable);

  // / → focus task input (only when not already editing something)
  if (e.key === '/' && !isEditing) {
    e.preventDefault();
    input.focus();
    input.select();
  }

  // Ctrl+M → toggle sidebar
  if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
    e.preventDefault();
    sidebar.classList.toggle('open');
  }
});

// ════════════════════════════════════
// PROFILE SYSTEM
// ════════════════════════════════════
let currentProfileId = null; // null = unsaved scratch
let isDirty = false;

const PROFILES_KEY = 'vanta_profiles';
function loadProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILES_KEY)) || { profiles: [], counter: 0 }; }
  catch(e) { return { profiles: [], counter: 0 }; }
}
function saveProfilesStore(store) { localStorage.setItem(PROFILES_KEY, JSON.stringify(store)); }
function markDirty() { isDirty = true; }
function markClean() { isDirty = false; }

function renderSidebar() {
  const sbList = document.getElementById('sb-list');
  const store = loadProfiles();
  if (!store.profiles.length) {
    sbList.innerHTML = `<div class="sb-empty">no saved profiles yet.<br>press + to save the current list.</div>`;
    return;
  }
  sbList.innerHTML = '';
  store.profiles.forEach(p => {
    const div = document.createElement('div');
    div.className = 'profile-item' + (p.id === currentProfileId ? ' active' : '');
    div.dataset.id = p.id;

    const nameEl = document.createElement('div');
    nameEl.className = 'profile-name';
    nameEl.textContent = p.name;
    nameEl.tabIndex = -1;

    // double-click to rename
    nameEl.addEventListener('dblclick', () => {
      nameEl.contentEditable = 'true';
      nameEl.focus();
      const r = document.createRange(); r.selectNodeContents(nameEl); r.collapse(false);
      const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
      let saved = false;
      function finishRename() {
        if (saved) return; saved = true;
        nameEl.contentEditable = 'false';
        const newName = nameEl.textContent.trim() || p.name;
        nameEl.textContent = newName;
        const store2 = loadProfiles();
        const idx = store2.profiles.findIndex(x => x.id === p.id);
        if (idx !== -1) { store2.profiles[idx].name = newName; saveProfilesStore(store2); }
      }
      nameEl.addEventListener('blur', finishRename, { once: true });
      nameEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
        if (e.key === 'Escape') { nameEl.textContent = p.name; nameEl.blur(); }
      });
    });

    const loadBtn = document.createElement('button');
    loadBtn.className = 'profile-load';
    loadBtn.title = 'Open profile';
    loadBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,2 7,5 3,8"/></svg>`;
    loadBtn.addEventListener('click', () => openProfile(p.id));

    const delBtn = document.createElement('button');
    delBtn.className = 'profile-del';
    delBtn.title = 'Delete profile';
    delBtn.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="1" y1="1" x2="7" y2="7"/><line x1="7" y1="1" x2="1" y2="7"/></svg>`;
    delBtn.addEventListener('click', () => deleteProfile(p.id));

    div.appendChild(nameEl);
    div.appendChild(loadBtn);
    div.appendChild(delBtn);
    sbList.appendChild(div);
  });
}

function saveCurrentAsProfile() {
  if (!items.length) return; // nothing to save
  const store = loadProfiles();
  store.counter = (store.counter || 0) + 1;
  const p = {
    id: Date.now(),
    name: 'profile ' + store.counter,
    items: cloneItems(),
    savedAt: Date.now()
  };
  store.profiles.unshift(p);
  saveProfilesStore(store);
  currentProfileId = p.id;
  markClean();
  renderSidebar();
  flashToast();
}

function saveToCurrentProfile() {
  if (!currentProfileId) { saveCurrentAsProfile(); return; }
  const store = loadProfiles();
  const idx = store.profiles.findIndex(x => x.id === currentProfileId);
  if (idx === -1) { saveCurrentAsProfile(); return; }
  store.profiles[idx].items = cloneItems();
  store.profiles[idx].savedAt = Date.now();
  saveProfilesStore(store);
  markClean();
  renderSidebar();
  flashToast();
}

function openProfile(id) {
  const store = loadProfiles();
  const p = store.profiles.find(x => x.id === id);
  if (!p) return;
  if (id === currentProfileId) { sidebar.classList.remove('open'); return; }

  function doOpen() {
    items = JSON.parse(JSON.stringify(p.items));
    idCounter = items.reduce((m, n) => Math.max(m, n.id || 0), idCounter);
    undoStack = []; redoStack = [];
    currentProfileId = id;
    markClean();
    render();
    updateTB();
    renderSidebar();
    sidebar.classList.remove('open');
  }

  if (isDirty && items.length > 0) {
    showModal(
      'Opening a new profile will discard any unsaved changes to your current list.<br>Are you sure you want to proceed?',
      doOpen
    );
  } else {
    doOpen();
  }
}

function deleteProfile(id) {
  const store = loadProfiles();
  store.profiles = store.profiles.filter(x => x.id !== id);
  saveProfilesStore(store);
  if (currentProfileId === id) {
    currentProfileId = null;
    markClean();
  }
  renderSidebar();
}

// ── MODAL ──
function showModal(msg, onYes) {
  const backdrop = document.getElementById('modal-backdrop');
  document.getElementById('modal-msg').innerHTML = msg;
  backdrop.classList.add('open');
  const yes = document.getElementById('modal-yes');
  const no  = document.getElementById('modal-no');
  function cleanup() { backdrop.classList.remove('open'); yes.replaceWith(yes.cloneNode(true)); no.replaceWith(no.cloneNode(true)); }
  document.getElementById('modal-yes').addEventListener('click', () => { cleanup(); onYes(); }, { once: true });
  document.getElementById('modal-no').addEventListener('click',  () => { cleanup(); },             { once: true });
}

// ── IMPORT / EXPORT ──
document.getElementById('sb-export-btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify({ items, profileId: currentProfileId }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vanta-checklist.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('sb-import-btn').addEventListener('click', () => {
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = '.json,application/json';
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const imported = Array.isArray(data) ? data : (data.items || []);
        function doImport() {
          items = imported;
          idCounter = items.reduce((m, n) => Math.max(m, n.id || 0), idCounter);
          undoStack = []; redoStack = [];
          currentProfileId = null;
          markDirty();
          render(); updateTB(); renderSidebar();
          sidebar.classList.remove('open');
        }
        if (isDirty && items.length > 0) {
          showModal('Importing will replace your current list.<br>Are you sure you want to proceed?', doImport);
        } else { doImport(); }
      } catch(err) { alert('Could not read the file. Make sure it\'s a valid Vanta JSON export.'); }
    };
    reader.readAsText(file);
  });
  fileInput.click();
});

document.getElementById('sb-new-btn').addEventListener('click', saveCurrentAsProfile);

// Ctrl+S
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (!items.length) return;
    saveToCurrentProfile();
  }
});

// ── INIT ──
(async () => {
  const cached = loadSettingsSync();
  let currentTheme = 'focus';
  if (cached && ALL_THEMES.includes(cached.theme)) currentTheme = cached.theme;
  applyTheme(currentTheme, false);
  renderSidebar();
  input.focus();
})();
</script>
</body>
